<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Circuit House · BOM Manager</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0C3D6B;--blue:#1A6BC4;--blue-lt:#EAF2FB;--blue-md:#C2DCF5;
  --green:#2D7A1F;--green-lt:#E6F4E3;--red:#B52B2B;--red-lt:#FBEAEA;
  --amber:#B06A00;--amber-lt:#FEF3E2;--purple:#5B2D8E;--purple-lt:#F0EAF8;
  --ink:#18181A;--ink-2:#4A4A50;--ink-3:#8A8A94;
  --surface:#FFFFFF;--wash:#F4F6F9;--border:#DDE2EA;--border-2:#C5CDD8;
  --r:8px;--rl:14px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--mono:'SF Mono','Consolas',monospace;
}
html,body{height:100%;font-family:var(--font);font-size:14px;background:var(--wash);color:var(--ink)}
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:232px;flex-shrink:0;background:var(--navy);display:flex;flex-direction:column;overflow-y:auto}
.content{flex:1;overflow-y:auto}
.page{padding:28px 32px;max-width:1300px}
.sb-brand{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo-mark{display:inline-flex;align-items:center;gap:7px}
.sb-logo-icon{width:26px;height:26px;background:var(--blue);border-radius:6px;display:flex;align-items:center;justify-content:center}
.sb-brand-name{font-size:15px;font-weight:700;color:#fff}
.sb-brand-sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px}
.sb-section{padding:12px 0 4px}
.sb-label{font-size:10px;font-weight:600;color:rgba(255,255,255,.3);letter-spacing:.9px;text-transform:uppercase;padding:0 18px 6px}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 18px;font-size:13px;color:rgba(255,255,255,.65);cursor:pointer;transition:all .15s;border-left:2px solid transparent}
.sb-item:hover{color:#fff;background:rgba(255,255,255,.07)}
.sb-item.active{color:#fff;background:rgba(255,255,255,.12);border-left-color:var(--blue);font-weight:500}
.sb-badge{margin-left:auto;font-size:10px;font-weight:600;background:rgba(255,255,255,.18);color:#fff;border-radius:10px;padding:2px 7px;min-width:20px;text-align:center}
.sb-badge.green{background:var(--green)}.sb-badge.amber{background:var(--amber)}.sb-badge.purple{background:var(--purple)}
.sb-bottom{margin-top:auto;padding:14px 18px;border-top:1px solid rgba(255,255,255,.1);font-size:11px;color:rgba(255,255,255,.4);display:flex;align-items:center;gap:7px}
.sb-dot{width:7px;height:7px;border-radius:50%;background:#4ADE80;box-shadow:0 0 6px rgba(74,222,128,.5)}
.page-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:12px}
.page-hd-left h1{font-size:20px;font-weight:700;letter-spacing:-.4px}
.page-hd-left p{font-size:13px;color:var(--ink-3);margin-top:3px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px}
.stat-val{font-size:28px;font-weight:700;letter-spacing:-.5px}
.stat-lbl{font-size:12px;color:var(--ink-3);margin-top:2px}
.stat-sub{font-size:11px;color:var(--ink-3);margin-top:6px}
.stat-box.blue .stat-val{color:var(--blue)}.stat-box.green .stat-val{color:var(--green)}
.stat-box.red .stat-val{color:var(--red)}.stat-box.amber .stat-val{color:var(--amber)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl)}
.card-hd{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.card-hd-title{font-size:14px;font-weight:600}
.card-body{padding:20px}.card-sm{padding:16px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border-2);background:var(--surface);color:var(--ink);transition:all .12s;white-space:nowrap;font-family:var(--font)}
.btn:hover{background:var(--wash)}.btn:active{transform:scale(.98)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}.btn-primary:hover{background:#1559a8}
.btn-success{background:var(--green);color:#fff;border-color:var(--green)}.btn-success:hover{background:#236016}
.btn-danger{background:var(--red);color:#fff;border-color:var(--red)}.btn-danger:hover{background:#941f1f}
.btn-amber{background:var(--amber);color:#fff;border-color:var(--amber)}.btn-amber:hover{background:#8a5200}
.btn-purple{background:var(--purple);color:#fff;border-color:var(--purple)}.btn-purple:hover{background:#4a2278}
.btn-ghost{border-color:transparent;background:transparent}.btn-ghost:hover{background:var(--wash)}
.btn-sm{padding:5px 10px;font-size:12px}.btn-xs{padding:3px 8px;font-size:11px}
.btn[disabled]{opacity:.4;pointer-events:none}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:12px;font-weight:500;color:var(--ink-2)}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 11px;border:1px solid var(--border-2);border-radius:var(--r);font-size:13px;color:var(--ink);font-family:var(--font);background:var(--surface)}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,107,196,.12)}
.fg textarea{resize:vertical;min-height:72px}
.form-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.fg-row{display:flex;align-items:center;gap:8px}
.sw{position:relative}.sw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--ink-3)}
.sw input{padding-left:34px}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:10px 12px;font-size:11px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:.5px;text-align:left;border-bottom:1px solid var(--border);background:var(--wash);white-space:nowrap}
tbody td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--blue-lt)}
.tr-v td{background:rgba(45,122,31,.04)}.tr-m td{background:rgba(181,43,43,.05)}
.tr-v:hover td{background:rgba(45,122,31,.08)!important}.tr-m:hover td{background:rgba(181,43,43,.1)!important}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.p-blue{background:var(--blue-lt);color:var(--blue)}.p-green{background:var(--green-lt);color:var(--green)}
.p-red{background:var(--red-lt);color:var(--red)}.p-amber{background:var(--amber-lt);color:var(--amber)}
.p-gray{background:var(--wash);color:var(--ink-2);border:1px solid var(--border)}
.p-purple{background:var(--purple-lt);color:var(--purple)}
.tm{font-family:var(--mono);font-size:11px;background:var(--wash);border:1px solid var(--border);padding:2px 7px;border-radius:5px;color:var(--ink-2)}
.tb{font-family:var(--mono);font-size:11px;background:var(--blue-lt);color:var(--blue);padding:2px 7px;border-radius:5px}
.tr2{font-family:var(--mono);font-size:11px;background:var(--red-lt);color:var(--red);padding:2px 7px;border-radius:5px}
.tabs{display:flex;gap:2px;background:var(--wash);border:1px solid var(--border);border-radius:var(--rl);padding:4px;margin-bottom:20px;width:fit-content}
.tab{padding:7px 18px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;color:var(--ink-3);transition:all .15s}
.tab:hover{color:var(--ink)}.tab.active{background:var(--surface);color:var(--blue);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.steps{display:flex;align-items:center;margin-bottom:28px}
.snum{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.snum.done{background:var(--green);color:#fff}.snum.active{background:var(--blue);color:#fff}.snum.pend{background:var(--border);color:var(--ink-3)}
.slbl{font-size:13px;margin-left:8px}.slbl.active{font-weight:600;color:var(--blue)}.slbl.done{color:var(--green)}.slbl.pend{color:var(--ink-3)}
.sline{flex:1;height:2px;background:var(--border);margin:0 10px;border-radius:1px}.sline.done{background:var(--green)}
.prog{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;border-radius:3px;transition:width .4s}
.alert{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:var(--r);font-size:13px;margin-bottom:16px}
.a-info{background:var(--blue-lt);color:var(--blue);border:1px solid var(--blue-md)}
.a-ok{background:var(--green-lt);color:var(--green);border:1px solid #A8D5A0}
.a-warn{background:var(--amber-lt);color:var(--amber);border:1px solid #F0C57A}
.a-err{background:var(--red-lt);color:var(--red);border:1px solid #F0A5A5}
hr{border:none;border-top:1px solid var(--border);margin:16px 0}
.abar{position:sticky;bottom:0;background:var(--surface);border-top:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.modal-bg{position:fixed;inset:0;background:rgba(12,20,30,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;backdrop-filter:blur(2px)}
.modal{background:var(--surface);border-radius:var(--rl);width:560px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border)}
.modal-hd h3{font-size:15px;font-weight:700}
.modal-body{padding:20px}.modal-ft{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:#fff;border-radius:var(--rl);padding:12px 18px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:9px;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:2000;opacity:0;transform:translateY(10px);transition:all .2s;pointer-events:none;max-width:400px}
.toast.show{opacity:1;transform:translateY(0)}
.ti{flex-shrink:0;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.ti.ok{background:#4ADE80}.ti.err{background:#F87171}.ti.info{background:#60A5FA}
.g{display:flex;gap:8px;align-items:center}
.mt{margin-top:8px}.mt2{margin-top:16px}.mt3{margin-top:24px}
.mb{margin-bottom:8px}.mb2{margin-bottom:16px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.muted{color:var(--ink-3)}.sm{font-size:12px}.bold{font-weight:700}
.tr{text-align:right}
input[type=checkbox]{width:15px;height:15px;accent-color:var(--blue);cursor:pointer}
.crit{font-size:10px;color:var(--amber);font-weight:600}
.ecnreq{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;background:var(--amber-lt);color:var(--amber);border-radius:4px;padding:2px 6px;border:1px solid #F0C57A}
.qa-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.qa-btn{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--wash);border:1px solid var(--border);border-radius:var(--rl);cursor:pointer;transition:all .15s;text-align:left;width:100%}
.qa-btn:hover{background:var(--blue-lt);border-color:var(--blue-md)}
.qa-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cl-row{display:grid;grid-template-columns:1fr 140px 120px 60px 90px 200px;align-items:center;padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px}
.cl-row:hover{background:var(--blue-lt)}
.cl-row.vv{background:rgba(45,122,31,.04)}.cl-row.vv:hover{background:rgba(45,122,31,.08)}
.cl-row.mm{background:rgba(181,43,43,.05)}.cl-row.mm:hover{background:rgba(181,43,43,.1)}
.cl-hdr{background:var(--wash);font-size:11px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--border);padding:8px 12px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;gap:12px}
.empty h3{font-size:15px;font-weight:600}.empty p{font-size:13px;color:var(--ink-3);max-width:280px}
.upload-zone{border:2px dashed var(--border-2);border-radius:var(--rl);padding:40px;text-align:center;cursor:pointer;transition:all .2s;background:var(--wash)}
.upload-zone:hover,.upload-zone.drag{border-color:var(--blue);background:var(--blue-lt)}
.drive-ok{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;background:var(--green-lt);color:var(--green);border:1px solid #A8D5A0}
.var-sel{font-size:11px;padding:3px 8px;border-radius:5px;border:1px solid var(--border-2);background:var(--surface);cursor:pointer;color:var(--blue);font-weight:500;margin-left:6px}
.var-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:var(--purple);background:var(--purple-lt);padding:2px 7px;border-radius:4px;border:1px solid #C9A8E8;margin-right:4px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="shell">
<div class="sidebar">
  <div class="sb-brand">
    <div class="sb-logo-mark">
      <div class="sb-logo-icon"><svg width="14" height="14" fill="none" stroke="#fff" stroke-width="2.5" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg></div>
      <div><div class="sb-brand-name">BOM Manager</div><div class="sb-brand-sub">Circuit House &middot; Lumio</div></div>
    </div>
  </div>
  <div class="sb-section">
    <div class="sb-label">Main</div>
    <div class="sb-item active" id="nav-dashboard" onclick="nav('dashboard')">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </div>
    <div class="sb-item" id="nav-bom" onclick="nav('bom')">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
      Master BOM <span class="sb-badge" id="bdg-bom">55</span>
    </div>
    <div class="sb-item" id="nav-bulk" onclick="nav('bulk')">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/></svg>
      Bulk Upload <span class="sb-badge purple">NEW</span>
    </div>
    <div class="sb-item" id="nav-verify" onclick="nav('verify')">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      Verification <span class="sb-badge amber" id="bdg-ver">0</span>
    </div>
    <div class="sb-item" id="nav-ecn" onclick="nav('ecn')">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/><line x1="12" y1="12" x2="12" y2="18"/></svg>
      ECN Log <span class="sb-badge green" id="bdg-ecn">0</span>
    </div>
    <div class="sb-item" id="nav-reports" onclick="nav('reports')">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Reports &amp; Drive
    </div>
  </div>
  <div class="sb-bottom"><span class="sb-dot"></span>Circuit House v3.1</div>
</div>
<div class="content" id="content"></div>
</div>
<div class="toast" id="toast"><div class="ti ok" id="ti"><svg width="10" height="10" fill="none" stroke="#fff" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><span id="tmsg"></span></div>
<div id="mc"></div>

<script>
// ─── SVG icons (string concat, no template literals) ───────────────
var I = {
  plus: '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
  chk:  '<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>',
  x:    '<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
  del:  '<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg>',
  srch: '<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>',
  up:   '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/></svg>',
  dl:   '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
  pdf:  '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/><line x1="9" y1="11" x2="15" y2="11"/></svg>',
  drv:  '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 16.74L17 8.16M7.41 8.16L2.34 16.74M12.07 3L3.87 17.52h16.26z"/></svg>',
  wrn:  '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
  ecn:  '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="12" x2="12" y2="18"/><line x1="9" y1="15" x2="15" y2="15"/></svg>',
  chks: '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M2 12l5 5L22 4"/><path d="M12 12l5 5"/></svg>'
};

// ─── BOM DATA ──────────────────────────────────────────────────────
var LH1G_BOM = [

// ─── ROUTER ───────────────────────────────────────────────────────
function nav(p){
  S.page=p;
  document.querySelectorAll('.sb-item').forEach(function(e){e.classList.remove('active');});
  var el=document.getElementById('nav-'+p);if(el)el.classList.add('active');
  badges();render();
}
function badges(){
  var tot=S.boms.LH1G.length+S.boms.LH3G.length;
  document.getElementById('bdg-bom').textContent=tot;
  document.getElementById('bdg-ver').textContent=S.vers.length;
  document.getElementById('bdg-ecn').textContent=S.ecns.length;
}
function render(){
  var el=document.getElementById('content');
  if(S.page==='dashboard')el.innerHTML=pgDash();
  else if(S.page==='bom')el.innerHTML=pgBOM();
  else if(S.page==='bulk')el.innerHTML=pgBulk();
  else if(S.page==='verify')el.innerHTML=S.vStep===1?pgV1():S.vStep===2?pgV2():pgV3();
  else if(S.page==='ecn')el.innerHTML=pgECN();
  else if(S.page==='reports')el.innerHTML=pgReports();
}

// ─── HELPERS ──────────────────────────────────────────────────────
function h(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function activeBOM(sku){return (S.boms[sku]||[]).filter(function(p){return p.vg?p.va!==false:true;});}
function pill(txt,cls){return '<span class="pill '+cls+'">'+txt+'</span>';}

  return '<div class="page"><div class="page-hd"><div class="page-hd-left"><h1>Dashboard</h1><p>Circuit House &middot; Lumio Projector BOM &amp; Quality Management</p></div><div class="g"><button class="btn btn-purple" onclick="nav(\'bulk\')">'+I.up+' Bulk Upload</button><button class="btn btn-primary" onclick="nav(\'verify\')">'+I.chk+' Start Verification</button></div></div><div class="stats-row"><div class="stat-box blue"><div class="stat-val">'+tp+'</div><div class="stat-lbl">Total BOM Parts</div><div class="stat-sub">LH1G ('+S.boms.LH1G.length+') &middot; LH3G ('+S.boms.LH3G.length+')</div></div><div class="stat-box"><div class="stat-val">'+vc+'</div><div class="stat-lbl">Verifications</div></div><div class="stat-box '+(ec>0?'amber':'')+'"><div class="stat-val">'+ec+'</div><div class="stat-lbl">ECNs Raised</div></div><div class="stat-box '+(S.dlog.length>0?'green':'')+'"><div class="stat-val">'+S.dlog.length+'</div><div class="stat-lbl">Drive Saves</div></div></div><div class="g2"><div class="card"><div class="card-hd"><span class="card-hd-title">Quick Actions</span></div><div class="card-body"><div class="qa-grid"><button class="qa-btn" onclick="nav(\'bulk\')"><div class="qa-icon" style="background:var(--purple-lt)">'+I.up+'</div><div><div style="font-weight:600;font-size:13px">Bulk Upload BOM</div><div class="sm muted">CSV or paste data</div></div></button><button class="qa-btn" onclick="nav(\'verify\')"><div class="qa-icon" style="background:var(--blue-lt)">'+I.chk+'</div><div><div style="font-weight:600;font-size:13px">Batch Verification</div><div class="sm muted">Check incoming lot</div></div></button><button class="qa-btn" onclick="nav(\'ecn\');setTimeout(showECNModal,50)"><div class="qa-icon" style="background:var(--amber-lt)">'+I.ecn+'</div><div><div style="font-weight:600;font-size:13px">Raise ECN</div><div class="sm muted">Engineering change</div></div></button><button class="qa-btn" onclick="nav(\'reports\')"><div class="qa-icon" style="background:va // ─── MASTER BOM ───────────────────────────────────────────────────
function pgBOM(){
  var q=S.q.toLowerCase();
  var allParts=activeBOM(S.sku);
  var parts=allParts.filter(function(p){return p.desc.toLowerCase().indexOf(q)>-1||p.pn.toLowerCase().indexOf(q)>-1||p.cat.toLowerCase().indexOf(q)>-1||(p.supplier||'').toLowerCase().indexOf(q)>-1;});
  var rows='';
  parts.forEach(function(p){
    var varHTML='';
    if(p.vg){
      var vparts=(S.boms[S.sku]||[]).filter(function(x){return x.vg===p.vg;});
      var opts=vparts.map(function(v){return '<option value="'+h(v.id)+'"'+(v.va!==false?' selected':'')+'>'+h(v.vl)+'</option>';}).join('');
      varHTML='<div style="margin-top:5px"><span class="var-badge">VARIANT</span><select class="var-sel" onchange="switchVar(\''+h(p.vg)+'\',this.value,\''+S.sku+'\')">'+opts+'</select></div>';
    }
    var altHTML=p.alt?'<span class="tm">'+h(p.alt)+'</span>':'<span class="muted sm">&mdash;</span>';
    var critHTML=p.critical?pill('YES','p-amber'):'<span class="muted sm">No</span>';
    rows+='<tr style="'+(p.vg?'border-left:3px solid var(--purple)':'')+'"><td><span class="tm">'+h(p.id)+'</span></td><td><div style="font-weight:500;max-width:200px">'+h(p.desc)+'</div>'+(p.critical?'<div class="crit">&#9888; Critical</div>':'')+varHTML+'</td><td><span class="tb">'+h(p.pn)+'</span></td><td>'+pill(p.cat,'p-gray')+'</td><td class="muted sm">'+h(p.supplier||'&mdash;')+'</td><td>'+p.qty+' '+p.unit+'</td><td>'+altHTML+'</td><td>'+critHTML+'</td><td class="tr"><button class="btn btn-xs btn-ghost" onclick="delPart(\''+h(p.id)+'\')">'+I.del+'</button></td></tr>';
  });
  var varGroups=[...new Set((S.boms[S.sku]||[]).filter(function(p){return p.vg;}).map(function(p){return p.vg;}))];
  var varNote=varGroups.length>0?'<div class="alert a-info mb2">'+I.chk+' <strong>'+varGroups.length+' variant group'+(varGroups.length>1?'s':'')+' detected</strong> &mdash; use the dropdowns in the table to switch active variant. Only the selected variant is shown and included in verification.</div>':'';
  var tabsHTML=['LH1G','LH3G'].map(function(s){return '<div class="tab'+(s===S.sku?' active':'')+'" onclick="S.sku=\''+s+'\';S.q=\'\';render()">'+s+' <span class="muted sm">('+activeBOM(s).length+')</span></div>';}).join('');
  return '<div class="page"><div class="page-hd"><div class="page-hd-left"><h1>Master BOM</h1><p>'+S.sku+' &mdash; '+parts.length+' parts shown</p></div><div class="g"><button class="btn btn-purple" onclick="nav(\'bulk\')">'+I.up+' Bulk Upload</button><button class="btn btn-primary" onclick="showAddModal()">'+I.plus+' Add Part</button><button class="btn" onclick="dlTemplate()">'+I.dl+' Template</button></div></div>'+varNote+'<div class="tabs">'+tabsHTML+'</div><div class="card"><div class="card-hd"><span class="card-hd-title">'+S.sku+' Parts</span><div class="sw" style="width:300px">'+I.srch+'<input type="text" placeholder="Search desc, PN, category, supplier&hellip;" value="'+h(S.q)+'" oninput="S.q=this.value;render()" style="height:34px"></div></div><div class="tbl-wrap"><table><thead><tr><th>Part ID</th><th>Description</th><th>Part Number</th><th>Category</th><th>Supplier</th><th>Qty</th><th>Alt PN</th><th>Critical</th><th></th></tr></thead><tbody>'+(rows||'<tr><td colspan="9"><div class="empty"><h3>No parts found</h3></div></td></tr>')+'</tbody></table></div></div></div>';
}

function switchVar(group,activeId,sku){
  (S.boms[sku]||[]).forEach(function(p){if(p.vg===group)p.va=(p.id===activeId);});
  save();render();
  var chosen=(S.boms[sku]||[]).find(function(p){return p.id===activeId;});
  if(chosen)toast('Active variant: '+chosen.pn);
}

function readFile(f){if(!f)return;var r=new FileReader();r.onload=function(e){previewCSV(e.target.result);};r.readAsText(f);}
function parsePaste(){var t=document.getElementById('pa').value.trim();if(t)previewCSV(t);else toast('Paste CSV data first','err');}
function parseCSV(text){
  var lines=text.trim().split('\n').map(function(l){return l.trim();}).filter(Boolean);
  if(!lines.length)return[];
  var first=lines[0].toLowerCase();
  var hasHdr=first.indexOf('desc')>-1||first.indexOf('pn')>-1;
  var data=hasHdr?lines.slice(1):lines;
  var cols=['id','desc','pn','cat','qty','unit','alt','critical','supplier'];
  var hmap=null;
  if(hasHdr){var hdr=lines[0].split(',').map(function(h){return h.trim().toLowerCase().replace(/[^a-z]/g,'');});hmap={};cols.forEach(function(c){var i=hdr.indexOf(c);if(i>=0)hmap[c]=i;});}
  return data.map(function(line,idx){
    var cells=line.split(',').map(function(c){return c.trim().replace(/^"|"$/g,'');});
    function get(col){if(hmap&&hmap[col]!==undefined)return cells[hmap[col]]||'';var def={id:0,desc:1,pn:2,cat:3,qty:4,unit:5,alt:6,critical:7,supplier:8};return cells[def[col]]||'';}
    return{id:get('id')||('BULK-'+(Date.now()+idx)),desc:get('desc'),pn:get('pn'),cat:get('cat')||'General',qty:parseFloat(get('qty'))||1,unit:get('unit')||'PCS',alt:get('alt'),critical:get('critical').toLowerCase()==='true',supplier:get('supplier')};
  }).filter(function(p){return p.desc&&p.pn;});
}
function previewCSV(text){
  var parsed=parseCSV(text);
  if(!parsed.length){toast('No valid rows found','err');return;}
  var sku=document.getElementById('bSKU').value;
  var dup=document.getElementById('bDup').value;
  var existing=new Set((S.boms[sku]||[]).map(function(p){return p.pn;}));
  var rows=parsed.map(function(p){var isDup=existing.has(p.pn);return Object.assign({},p,{_t:isDup?(dup==='skip'?'dup':'upd'):'new'});});
  var nw=rows.filter(function(r){return r._t==='new';}).length;
  var du=rows.filter(function(r){return r._t==='dup';}).length;
  var up=rows.filter(function(r){return r._t==='upd';}).length;
  var trows=rows.map(function(r){return '<tr class="'+(r._t==='new'?'tr-v':r._t==='dup'?'tr-m':'')+'"><td>'+pill(r._t==='new'?'NEW':r._t==='dup'?'SKIP':'UPD',r._t==='new'?'p-green':r._t==='dup'?'p-red':'p-amber')+'</td><td class="sm">'+h(r.id)+'</td><td style="max-width:180px;font-size:12px">'+h(r.desc)+'</td><td><span class="tb sm">'+h(r.pn)+'</span></td><td>'+pill(r.cat,'p-gray')+'</td><td>'+r.qty+'</td><td>'+r.unit+'</td><td>'+h(r.alt||'&mdash;')+'</td><td>'+(r.critical?pill('YES','p-amber'):'No')+'</td></tr>';}).join('');
  var rowsJSON=h(JSON.stringify(rows));
  document.getElementById('bprev').innerHTML='<div class="card mt3"><div class="card-hd"><span class="card-hd-title">Preview &mdash; '+parsed.length+' rows</span><div class="g">'+pill(nw+' new','p-green')+(du>0?pill(du+' skip','p-red'):''+(up>0?pill(up+' update','p-amber'):''))+'</div></div><div class="tbl-wrap" style="max-height:360px;overflow-y:auto"><table><thead><tr><th>Status</th><th>ID</th><th>Description</th><th>PN</th><th>Cat</th><th>Qty</th><th>Unit</th><th>Alt</th><th>Critical</th></tr></thead><tbody>'+trows+'</tbody></table></div><div class="abar"><span class="sm muted">Target: <b>'+sku+'</b></span><div class="g"><button class="btn" onclick="document.getElementById(\'bprev\').innerHTML=\'\'">Cancel</button><button class="btn btn-purple" onclick="commitUpload(\''+rowsJSON+'\',\''+sku+'\',\''+dup+'\')">'+I.up+' Import '+(nw+up)+' parts</button></div></div></div>';
}
function commitUpload(rowsJSON,sku,dup){
  var rows=JSON.parse(rowsJSON.replace(/&quot;/g,'"'));
  var existing=S.boms[sku]||[];
  var added=0,updated=0,skipped=0;
  rows.forEach(function(r){var t=r._t;delete r._t;if(t==='new'){existing.push(r);added++;}else if(t==='upd'){var i=existing.findIndex(function(p){return p.pn===r.pn;});if(i>=0){existing[i]=Object.assign(existing[i],r);updated++;}else{existing.push(r);added++;}}else{skipped++;}});
  S.boms[sku]=existing;save();badges();
  var drv=document.getElementById('bDrv').checked;
  if(drv)S.dlog.push({name:'BOM_Bulk_'+sku+'_'+new Date().toISOString().split('T')[0]+'.csv',desc:'Bulk: '+added+' added, '+updated+' updated to '+sku,type:'bom',ts:new Date().toLocaleString('en-IN')});
  document.getElementById('bprev').innerHTML='<div class="alert a-ok mt2">'+I.chk+' Imported '+added+' new, '+updated+' updated, '+skipped+' skipped into '+sku+'.'+(drv?' Logged to Drive.':'')+'</div>';
  toast('Imported '+(added+updated)+' parts into '+sku);
  setTimeout(function(){nav('bom');S.sku=sku;},1800);
}

function stepsHTML(a){
  var labels=['Batch Details','Part Verification','Report'];
  var out='<div class="steps">';
  labels.forEach(function(n,i){
    var num=i+1;
    var cls=num<a?'done':num===a?'active':'pend';
    if(i>0)out+='<div class="sline'+(num<=a?' done':'')+'"></div>';
    out+='<div style="display:flex;align-items:center"><div class="snum '+cls+'">'+(num<a?I.chk:num)+'</div><span class="slbl '+cls+'">'+n+'</span></div>';
  });
  return out+'</div>';
}

  S.vRes={};S.vq='';S.vStep=2;render();
}
function markV(id){S.vRes[id]={status:'verified'};render();}
function showMM(id,masterPN){
  document.getElementById('mc').innerHTML='<div class="modal-bg"><div class="modal" style="width:440px"><div class="modal-hd"><h3>'+I.x+' Part Mismatch</h3><button class="btn btn-ghost" onclick="closeM()">'+I.x+'</button></div><div class="modal-body"><div class="alert a-warn">'+I.wrn+' Master BOM: <b>'+h(masterPN)+'</b>. Enter the actual PN found in this batch.</div><div class="fg"><label>Actual Part Number Found *</label><input id="mm_pn" type="text" placeholder="Actual PN" autofocus></div><div class="fg mt"><label>Notes (optional)</label><input id="mm_note" type="text" placeholder="e.g. wrong connector type"></div></div><div class="modal-ft"><button class="btn" onclick="closeM()">Cancel</button><button class="btn btn-danger" onclick="confMM(\''+h(id)+'\')">Confirm Mismatch</button></div></div></div>';

}
function confMM(id){

  S.vRes[id]={status:'mismatch',newPN:pn};
  closeM();toast('Mismatch recorded','info');render();
}
function verifyAll(){var bom=activeBOM(S.vDet.model||'LH1G');bom.forEach(function(p){if(!(S.vRes[p.id]||{}).status)S.vRes[p.id]={status:'verified'};});render();}
function finishVer(){
  var bom=activeBOM(S.vDet.model||'LH1G');
  var results=bom.map(function(p){return Object.assign({},p,{status:(S.vRes[p.id]||{}).status||'pending',newPN:(S.vRes[p.id]||{}).newPN||''});});

  var vid='VER_'+Date.now();
  var ver=Object.assign({},S.vDet,{id:vid,results:results,result:xm===0&&ok===results.length?'PASS':'FAIL',saved:false});

  save();badges();S.vStep=3;render();
}

.partId||'')+'\')">Submit ECN</button></div></div></div>';
}
function submitECN(pid){
  var model=document.getElementById('eM').value;
  var oldPN=document.getElementById('eO').value.trim();
  var newPN=document.getElementById('eN').value.trim();
  var desc=document.getElementById('eDsc').value.trim();
  var reason=document.getElementById('eR').value.trim();
  if(!oldPN||!newPN||!desc||!reason){toast('Fill all required fields','err');return;}
  var ecnNo='ECN-'+new Date().getFullYear()+'-'+String(S.ecns.length+1).padStart(3,'0');
  var docName=document.getElementById('eDoc').value.trim();
  S.ecns.push({ecnNo:ecnNo,model:model,date:document.getElementById('eD').value,oldPN:oldPN,newPN:newPN,desc:desc,reason:reason,docName:docName,approved:document.getElementById('eApp').checked});
  if(document.getElementById('eBOM').checked){var p=(S.boms[model]||[]).find(function(x){return x.pn===oldPN;});if(p){p.pn=newPN;toast('BOM updated: '+oldPN+' to '+newPN);}}

}
