<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Circuit House · BOM Manager</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy:    #0C3D6B;
  --blue:    #1A6BC4;
  --blue-lt: #EAF2FB;
  --blue-md: #C2DCF5;
  --green:   #2D7A1F;
  --green-lt:#E6F4E3;
  --red:     #B52B2B;
  --red-lt:  #FBEAEA;
  --amber:   #B06A00;
  --amber-lt:#FEF3E2;
  --ink:     #18181A;
  --ink-2:   #4A4A50;
  --ink-3:   #8A8A94;
  --surface: #FFFFFF;
  --wash:    #F4F6F9;
  --border:  #DDE2EA;
  --border-2:#C5CDD8;
  --radius:  8px;
  --radius-lg:14px;
  --shadow:  0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.05);
  --shadow-md:0 2px 8px rgba(0,0,0,.10), 0 8px 24px rgba(0,0,0,.08);
  --font:    -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono:    'SF Mono', 'Consolas', monospace;
}
html,body { height:100%; font-family:var(--font); font-size:14px; background:var(--wash); color:var(--ink); }
.shell { display:flex; height:100vh; overflow:hidden; }
.sidebar { width:232px; flex-shrink:0; background:var(--navy); display:flex; flex-direction:column; overflow-y:auto; }
.content { flex:1; overflow-y:auto; }
.page { padding:28px 32px; max-width:1200px; }
.sb-brand { padding:20px 18px 16px; border-bottom:1px solid rgba(255,255,255,.1); }
.sb-brand-name { font-size:15px; font-weight:700; color:#fff; letter-spacing:-.3px; }
.sb-brand-sub { font-size:11px; color:rgba(255,255,255,.45); margin-top:2px; }
.sb-logo-mark { display:inline-flex; align-items:center; gap:7px; }
.sb-logo-icon { width:26px; height:26px; background:var(--blue); border-radius:6px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.sb-section { padding:12px 0 4px; }
.sb-label { font-size:10px; font-weight:600; color:rgba(255,255,255,.3); letter-spacing:.9px; text-transform:uppercase; padding:0 18px 6px; }
.sb-item { display:flex; align-items:center; gap:10px; padding:9px 18px; font-size:13px; color:rgba(255,255,255,.65); cursor:pointer; transition:all .15s; border-left:2px solid transparent; }
.sb-item:hover { color:#fff; background:rgba(255,255,255,.07); }
.sb-item.active { color:#fff; background:rgba(255,255,255,.12); border-left-color:var(--blue); font-weight:500; }
.sb-item svg { flex-shrink:0; opacity:.8; }
.sb-item.active svg { opacity:1; }
.sb-badge { margin-left:auto; font-size:10px; font-weight:600; background:rgba(255,255,255,.18); color:#fff; border-radius:10px; padding:2px 7px; min-width:20px; text-align:center; }
.sb-badge.green { background:var(--green); }
.sb-badge.amber { background:var(--amber); }
.sb-badge.red { background:var(--red); }
.sb-bottom { margin-top:auto; padding:14px 18px; border-top:1px solid rgba(255,255,255,.1); }
.sb-status { display:flex; align-items:center; gap:7px; font-size:11px; color:rgba(255,255,255,.4); }
.sb-dot { width:7px; height:7px; border-radius:50%; background:#4ADE80; box-shadow:0 0 6px rgba(74,222,128,.5); }
.page-hd { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:24px; gap:12px; }
.page-hd-left h1 { font-size:20px; font-weight:700; letter-spacing:-.4px; color:var(--ink); }
.page-hd-left p { font-size:13px; color:var(--ink-3); margin-top:3px; }
.stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:24px; }
.stat-box { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:16px 18px; }
.stat-box-val { font-size:28px; font-weight:700; letter-spacing:-.5px; }
.stat-box-lbl { font-size:12px; color:var(--ink-3); margin-top:2px; }
.stat-box-sub { font-size:11px; color:var(--ink-3); margin-top:6px; }
.stat-box.blue .stat-box-val { color:var(--blue); }
.stat-box.green .stat-box-val { color:var(--green); }
.stat-box.red .stat-box-val { color:var(--red); }
.stat-box.amber .stat-box-val { color:var(--amber); }
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); }
.card-hd { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--border); }
.card-hd-title { font-size:14px; font-weight:600; }
.card-body { padding:20px; }
.card-body-sm { padding:16px; }
.btn { display:inline-flex; align-items:center; gap:6px; padding:8px 14px; border-radius:var(--radius); font-size:13px; font-weight:500; cursor:pointer; border:1px solid var(--border-2); background:var(--surface); color:var(--ink); transition:all .12s; white-space:nowrap; font-family:var(--font); }
.btn:hover { background:var(--wash); }
.btn:active { transform:scale(.98); }
.btn-primary { background:var(--blue); color:#fff; border-color:var(--blue); }
.btn-primary:hover { background:#1559a8; border-color:#1559a8; }
.btn-success { background:var(--green); color:#fff; border-color:var(--green); }
.btn-success:hover { background:#236016; }
.btn-danger { background:var(--red); color:#fff; border-color:var(--red); }
.btn-danger:hover { background:#941f1f; }
.btn-amber { background:var(--amber); color:#fff; border-color:var(--amber); }
.btn-amber:hover { background:#8a5200; }
.btn-ghost { border-color:transparent; background:transparent; }
.btn-ghost:hover { background:var(--wash); }
.btn-sm { padding:5px 10px; font-size:12px; }
.btn-xs { padding:3px 8px; font-size:11px; }
.btn-icon { padding:6px; }
.btn[disabled] { opacity:.4; pointer-events:none; }
.fg { display:flex; flex-direction:column; gap:5px; }
.fg label { font-size:12px; font-weight:500; color:var(--ink-2); }
.fg input, .fg select, .fg textarea { width:100%; padding:8px 11px; border:1px solid var(--border-2); border-radius:var(--radius); font-size:13px; color:var(--ink); font-family:var(--font); background:var(--surface); transition:border-color .12s,box-shadow .12s; }
.fg input:focus, .fg select:focus, .fg textarea:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 3px rgba(26,107,196,.12); }
.fg textarea { resize:vertical; min-height:72px; }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.form-grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }
.fg-row { display:flex; align-items:center; gap:8px; }
.search-wrap { position:relative; }
.search-wrap svg { position:absolute; left:10px; top:50%; transform:translateY(-50%); pointer-events:none; color:var(--ink-3); }
.search-wrap input { padding-left:34px; }
.tbl-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:13px; }
thead th { padding:10px 12px; font-size:11px; font-weight:600; color:var(--ink-3); text-transform:uppercase; letter-spacing:.5px; text-align:left; border-bottom:1px solid var(--border); background:var(--wash); white-space:nowrap; }
tbody td { padding:10px 12px; border-bottom:1px solid var(--border); vertical-align:middle; }
tbody tr:last-child td { border-bottom:none; }
tbody tr:hover td { background:var(--blue-lt); }
.tr-verified td { background:rgba(45,122,31,.04); }
.tr-mismatch td { background:rgba(181,43,43,.05); }
.tr-verified:hover td { background:rgba(45,122,31,.08)!important; }
.tr-mismatch:hover td { background:rgba(181,43,43,.1)!important; }
.pill { display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:600; }
.pill-blue { background:var(--blue-lt); color:var(--blue); }
.pill-green { background:var(--green-lt); color:var(--green); }
.pill-red { background:var(--red-lt); color:var(--red); }
.pill-amber { background:var(--amber-lt); color:var(--amber); }
.pill-gray { background:var(--wash); color:var(--ink-2); border:1px solid var(--border); }
.tag-mono { font-family:var(--mono); font-size:11.5px; background:var(--wash); border:1px solid var(--border); padding:2px 7px; border-radius:5px; color:var(--ink-2); }
.tag-blue { font-family:var(--mono); font-size:11.5px; background:var(--blue-lt); color:var(--blue); padding:2px 7px; border-radius:5px; }
.tag-red { font-family:var(--mono); font-size:11.5px; background:var(--red-lt); color:var(--red); padding:2px 7px; border-radius:5px; }
.tabs { display:flex; gap:2px; background:var(--wash); border:1px solid var(--border); border-radius:var(--radius-lg); padding:4px; margin-bottom:20px; width:fit-content; }
.tab { padding:7px 18px; border-radius:10px; font-size:13px; font-weight:500; cursor:pointer; color:var(--ink-3); transition:all .15s; }
.tab:hover { color:var(--ink); }
.tab.active { background:var(--surface); color:var(--blue); box-shadow:var(--shadow); }
.steps { display:flex; align-items:center; margin-bottom:28px; }
.step { display:flex; align-items:center; gap:8px; }
.step-num { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; flex-shrink:0; }
.step-num.done { background:var(--green); color:#fff; }
.step-num.active { background:var(--blue); color:#fff; }
.step-num.pending { background:var(--border); color:var(--ink-3); }
.step-label { font-size:13px; }
.step-label.active { font-weight:600; color:var(--blue); }
.step-label.done { color:var(--green); }
.step-label.pending { color:var(--ink-3); }
.step-line { flex:1; height:2px; background:var(--border); margin:0 10px; border-radius:1px; }
.step-line.done { background:var(--green); }
.progress { height:6px; background:var(--border); border-radius:3px; overflow:hidden; margin-top:8px; }
.progress-fill { height:100%; border-radius:3px; transition:width .4s; }
.alert { display:flex; align-items:flex-start; gap:10px; padding:12px 14px; border-radius:var(--radius); font-size:13px; margin-bottom:16px; }
.alert-info { background:var(--blue-lt); color:var(--blue); border:1px solid var(--blue-md); }
.alert-success { background:var(--green-lt); color:var(--green); border:1px solid #A8D5A0; }
.alert-warning { background:var(--amber-lt); color:var(--amber); border:1px solid #F0C57A; }
.alert-danger { background:var(--red-lt); color:var(--red); border:1px solid #F0A5A5; }
hr { border:none; border-top:1px solid var(--border); margin:16px 0; }
.action-bar { position:sticky; bottom:0; background:var(--surface); border-top:1px solid var(--border); padding:12px 20px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
.modal-bg { position:fixed; inset:0; background:rgba(12,20,30,.5); display:flex; align-items:center; justify-content:center; z-index:1000; padding:20px; backdrop-filter:blur(2px); }
.modal { background:var(--surface); border-radius:var(--radius-lg); width:540px; max-width:100%; max-height:90vh; overflow-y:auto; box-shadow:var(--shadow-md); }
.modal-hd { display:flex; align-items:center; justify-content:space-between; padding:18px 20px; border-bottom:1px solid var(--border); }
.modal-hd h3 { font-size:15px; font-weight:700; }
.modal-body { padding:20px; }
.modal-body .form-grid { margin-bottom:14px; }
.modal-ft { padding:14px 20px; border-top:1px solid var(--border); display:flex; gap:8px; justify-content:flex-end; }
.toast { position:fixed; bottom:24px; right:24px; background:var(--ink); color:#fff; border-radius:var(--radius-lg); padding:12px 18px; font-size:13px; font-weight:500; display:flex; align-items:center; gap:9px; box-shadow:var(--shadow-md); z-index:2000; opacity:0; transform:translateY(10px) scale(.97); transition:all .2s; pointer-events:none; max-width:380px; }
.toast.show { opacity:1; transform:translateY(0) scale(1); }
.toast-icon { flex-shrink:0; width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
.toast-icon.ok { background:#4ADE80; }
.toast-icon.err { background:#F87171; }
.toast-icon.info { background:#60A5FA; }
.gap { display:flex; gap:8px; align-items:center; }
.gap-12 { gap:12px; }
.mt { margin-top:8px; }
.mt-2 { margin-top:16px; }
.mt-3 { margin-top:24px; }
.mb { margin-bottom:8px; }
.mb-2 { margin-bottom:16px; }
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; }
.muted { color:var(--ink-3); }
.small { font-size:12px; }
.bold { font-weight:700; }
code { font-family:var(--mono); font-size:12px; }
.text-right { text-align:right; }
.text-center { text-align:center; }
.flex-1 { flex:1; }
input[type=checkbox] { width:15px; height:15px; accent-color:var(--blue); cursor:pointer; }
.critical-badge { font-size:10px; color:var(--amber); font-weight:600; }
.ecn-req { display:inline-flex; align-items:center; gap:4px; font-size:10px; font-weight:600; background:var(--amber-lt); color:var(--amber); border-radius:4px; padding:2px 6px; border:1px solid #F0C57A; }
.qa-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.qa-btn { display:flex; align-items:center; gap:12px; padding:14px 16px; background:var(--wash); border:1px solid var(--border); border-radius:var(--radius-lg); cursor:pointer; transition:all .15s; text-align:left; width:100%; }
.qa-btn:hover { background:var(--blue-lt); border-color:var(--blue-md); }
.qa-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.qa-label { font-size:13px; font-weight:600; }
.qa-sub { font-size:11px; color:var(--ink-3); margin-top:1px; }
.checklist-row { display:grid; grid-template-columns:1fr 130px 130px 60px 90px 190px; gap:0; align-items:center; padding:10px 12px; border-bottom:1px solid var(--border); font-size:13px; }
.checklist-row:last-child { border-bottom:none; }
.checklist-row:hover { background:var(--blue-lt); }
.checklist-row.verified { background:rgba(45,122,31,.04); }
.checklist-row.verified:hover { background:rgba(45,122,31,.08); }
.checklist-row.mismatch { background:rgba(181,43,43,.05); }
.checklist-row.mismatch:hover { background:rgba(181,43,43,.1); }
.checklist-hdr { background:var(--wash); font-size:11px; font-weight:600; color:var(--ink-3); text-transform:uppercase; letter-spacing:.5px; border-bottom:2px solid var(--border); padding:8px 12px; }
.empty { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; text-align:center; gap:12px; }
.empty-icon { width:56px; height:56px; background:var(--wash); border-radius:16px; display:flex; align-items:center; justify-content:center; }
.empty h3 { font-size:15px; font-weight:600; }
.empty p { font-size:13px; color:var(--ink-3); max-width:280px; }
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>

function saveState(){try{localStorage.setItem('ch_bom',JSON.stringify({boms:S.boms,verifications:S.verifications,ecns:S.ecns}));}catch(e){}}
function loadState(){try{const d=localStorage.getItem('ch_bom');if(d){const p=JSON.parse(d);Object.assign(S,p);}}catch(e){}}
loadState();

function nav(page){
  S.page=page;
  document.querySelectorAll('.sb-item').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById('nav-'+page);
  if(el)el.classList.add('active');
  updateBadges();render();
}
function updateBadges(){
  const total=S.boms.LH1G.length+S.boms.LH3G.length;
  document.getElementById('sb-bom-badge').textContent=total;
  document.getElementById('sb-ver-badge').textContent=S.verifications.length;
  document.getElementById('sb-ecn-badge').textContent=S.ecns.length;
}
function render(){
  const c=document.getElementById('content');
  switch(S.page){
    case'dashboard':c.innerHTML=pageDashboard();break;
    case'bom':c.innerHTML=pageBOM();break;
    case'verify':c.innerHTML=pageVerify();break;
    case'ecn':c.innerHTML=pageECN();break;
    case'reports':c.innerHTML=pageReports();break;
  }
}

function pageDashboard(){

  const verCount=S.verifications.length;
  const ecnCount=S.ecns.length;

  return `<div class="page">
  <div class="page-hd">
    <div class="page-hd-left"><h1>Dashboard</h1><p>Circuit House &middot; Projector BOM &amp; Quality Management</p></div>
    <div class="gap"><button class="btn btn-primary" onclick="nav('verify')">${ico.check} Start Verification</button></div>
  </div>
  <div class="stats-row">
    <div class="stat-box blue"><div class="stat-box-val">${totalParts}</div><div class="stat-box-lbl">Total BOM Parts</div><div class="stat-box-sub">LH1G (${S.boms.LH1G.length}) &middot; LH3G (${S.boms.LH3G.length})</div></div>
    <div class="stat-box"><div class="stat-box-val">${verCount}</div><div class="stat-box-lbl">Verifications Run</div><div class="stat-box-sub">Across all batches</div></div>
    <div class="stat-box ${ecnCount>0?'amber':''}"><div class="stat-box-val">${ecnCount}</div><div class="stat-box-lbl">ECNs Raised</div><div class="stat-box-sub">${mismatches} part mismatches total</div></div>
    <div class="stat-box ${mismatches>0?'red':'green'}"><div class="stat-box-val">${mismatches}</div><div class="stat-box-lbl">Open Mismatches</div><div class="stat-box-sub">${mismatches===0?'All clear':'Requires ECN action'}</div></div>
  </div>
  <div class="grid-2">
    <div class="card">
      <div class="card-hd"><span class="card-hd-title">Quick Actions</span></div>
      <div class="card-body">
        <div class="qa-grid">
          <button class="qa-btn" onclick="nav('verify')"><div class="qa-icon" style="background:var(--blue-lt)">${ico.check.replace('13','18')}</div><div><div class="qa-label">Batch Verification</div><div class="qa-sub">Check incoming lot</div></div></button>
          <button class="qa-btn" onclick="nav('bom');setTimeout(()=>showAddPartModal(),50)"><div class="qa-icon" style="background:var(--green-lt)">${ico.plus.replace('14','18')}</div><div><div class="qa-label">Add Part</div><div class="qa-sub">Update master BOM</div></div></button>
          <button class="qa-btn" onclick="nav('ecn');setTimeout(()=>showECNModal(),50)"><div class="qa-icon" style="background:var(--amber-lt)">${ico.ecn.replace('14','18')}</div><div><div class="qa-label">Raise ECN</div><div class="qa-sub">Engineering change notice</div></div></button>
          <button class="qa-btn" onclick="nav('reports')"><div class="qa-icon" style="background:#F0F0FF">${ico.pdf.replace('14','18')}</div><div><div class="qa-label">PDF Reports</div><div class="qa-sub">Export &amp; Drive upload</div></div></button>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-hd"><span class="card-hd-title">Recent Verifications</span></div>
      <div class="card-body-sm">
        ${recentVers.length===0?`<div class="empty" style="padding:32px 0"><p>No verifications yet. Start one from Quick Actions.</p></div>`:
          recentVers.map(v=>{const ok=(v.results||[]).filter(r=>r.status==='verified').length;const mm=(v.results||[]).filter(r=>r.status==='mismatch').length;const tot=(v.results||[]).length;const pass=mm===0&&ok===tot;
          return `<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
            <div style="flex:1"><div class="bold" style="font-size:13px">${v.batchNo}</div><div class="muted small">${v.model} &middot; ${v.kitQty} kits &middot; ${v.date}</div></div>
            <span class="pill ${pass?'pill-green':mm>0?'pill-red':'pill-amber'}">${ok}/${tot} ${pass?'Pass':mm>0?'Fail':'Partial'}</span>
            <button class="btn btn-xs btn-ghost" onclick="nav('reports')">${ico.pdf}</button>
          </div>`;}).join('')}
      </div>
    </div>
  </div>
  <div class="card mt-3">
    <div class="card-hd"><span class="card-hd-title">BOM Overview</span></div>
    <div class="card-body"><div class="grid-2">
      ${S.skus.map(sku=>`<div style="background:var(--wash);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <span style="font-size:16px;font-weight:700;letter-spacing:-.3px">${sku}</span>
          <span class="pill pill-blue">${S.boms[sku].length} parts</span>
        </div>
        <div class="small muted mb-2">Critical: <b style="color:var(--amber)">${S.boms[sku].filter(p=>p.critical).length}</b> &nbsp;&middot;&nbsp; With alternates: <b>${S.boms[sku].filter(p=>p.alt).length}</b></div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:8px">${[...new Set(S.boms[sku].map(p=>p.cat))].map(c=>`<span class="pill pill-gray">${c}</span>`).join('')}</div>
        <button class="btn btn-sm mt-2" onclick="S.activeSKU='${sku}';nav('bom')">View BOM &rarr;</button>
      </div>`).join('')}
    </div></div>
  </div>
</div>`;}

function pageBOM(){
  const q=S.bomSearch.toLowerCase();
  const parts=S.boms[S.activeSKU].filter(p=>p.desc.toLowerCase().includes(q)||p.pn.toLowerCase().includes(q)||p.cat.toLowerCase().includes(q));
  return `<div class="page">
  <div class="page-hd">
    <div class="page-hd-left"><h1>Master BOM</h1><p>Bill of materials &mdash; single source of truth for all SKUs</p></div>
    <div class="gap"><button class="btn btn-primary" onclick="showAddPartModal()">${ico.plus} Add Part</button></div>
  </div>
  <div class="tabs">
    ${S.skus.map(s=>`<div class="tab ${s===S.activeSKU?'active':''}" onclick="S.activeSKU='${s}';S.bomSearch='';render()">${s} <span class="muted small">(${S.boms[s].length})</span></div>`).join('')}
  </div>
  <div class="card">
    <div class="card-hd">
      <span class="card-hd-title">${S.activeSKU} Parts &mdash; ${parts.length} shown</span>
      <div class="search-wrap" style="width:280px">${ico.search}<input type="text" id="bomSearch" placeholder="Search description, PN, category&hellip;" value="${S.bomSearch}" oninput="S.bomSearch=this.value;render()" style="height:34px"></div>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Part ID</th><th>Description</th><th>Part Number</th><th>Category</th><th>Qty</th><th>Alternate PN</th><th>Critical</th><th style="width:80px"></th></tr></thead>

        parts.map(p=>`<tr>
          <td><span class="tag-mono">${p.id}</span></td>
          <td><div style="font-weight:500">${p.desc}</div>${p.critical?`<div class="critical-badge">&#9888; Critical part</div>`:''}</td>
          <td><span class="tag-blue">${p.pn}</span></td>
          <td><span class="pill pill-gray">${p.cat}</span></td>
          <td>${p.qty} ${p.unit}</td>
          <td>${p.alt?`<span class="tag-mono">${p.alt}</span>`:`<span class="muted small">&mdash;</span>`}</td>
          <td>${p.critical?`<span class="pill pill-amber">YES</span>`:`<span class="muted small">No</span>`}</td>
          <td class="text-right"><button class="btn btn-xs btn-ghost" onclick="deletePart('${p.id}')" title="Delete">${ico.trash}</button></td>
        </tr>`).join('')}
      </tbody>
    </table></div>
  </div>
</div>`;}

function pageVerify(){
  if(S.verStep===1)return verStep1();
  if(S.verStep===2)return verStep2();
  if(S.verStep===3)return verStep3();
  return verStep1();
}

function stepsHtml(active){
  const steps=['Batch Details','Part Verification','Report & Export'];
  return `<div class="steps">${steps.map((s,i)=>{const n=i+1;const cls=n<active?'done':n===active?'active':'pending';
    return `${i>0?`<div class="step-line ${n<=active?'done':''}"></div>`:''}
    <div class="step"><div class="step-num ${cls}">${n<active?ico.check:n}</div><span class="step-label ${cls}">${s}</span></div>`;
  }).join('')}</div>`;}

function verStep1(){
  const today=new Date().toISOString().split('T')[0];
  return `<div class="page">
  <div class="page-hd"><div class="page-hd-left"><h1>Batch Verification</h1><p>Verify incoming lot against master BOM</p></div></div>
  ${stepsHtml(1)}
  <div style="max-width:600px">
    <div class="card">
      <div class="card-hd"><span class="card-hd-title">Batch Information</span></div>
      <div class="card-body">
        <div class="form-grid mb-2">
          <div class="fg"><label>Batch / Lot Number *</label><input type="text" id="vBatch" placeholder="e.g. B2025-JUL-042" value="${S.verDetails.batchNo||''}"></div>
          <div class="fg"><label>Model / SKU *</label><select id="vModel"><option value="">Select&hellip;</option>${S.skus.map(s=>`<option value="${s}" ${S.verDetails.model===s?'selected':''}>${s}</option>`).join('')}</select></div>
          <div class="fg"><label>Kit Quantity *</label><input type="number" id="vQty" placeholder="e.g. 500" min="1" value="${S.verDetails.kitQty||''}"></div>
          <div class="fg"><label>Verification Date</label><input type="date" id="vDate" value="${S.verDetails.date||today}"></div>
          <div class="fg"><label>Verified By</label><input type="text" id="vBy" placeholder="Your name" value="${S.verDetails.by||''}"></div>
          <div class="fg"><label>Factory / Supplier</label><input type="text" id="vFactory" placeholder="e.g. iDigital Bangalore" value="${S.verDetails.factory||''}"></div>
        </div>
        <div class="fg"><label>Remarks</label><textarea id="vRemarks" placeholder="Any notes about this batch&hellip;">${S.verDetails.remarks||''}</textarea></div>
        <div class="mt-2"><button class="btn btn-primary" onclick="startVer()">${ico.check} Start Part Verification</button></div>
      </div>
    </div>
  </div>
  ${S.verifications.length>0?`<div class="card mt-3">
    <div class="card-hd"><span class="card-hd-title">Verification History</span></div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Batch No</th><th>Model</th><th>Kit Qty</th><th>Date</th><th>By</th><th>Result</th><th>Status</th><th></th></tr></thead>
      <tbody>${[...S.verifications].reverse().map(v=>{const ok=(v.results||[]).filter(r=>r.status==='verified').length;const mm=(v.results||[]).filter(r=>r.status==='mismatch').length;const tot=(v.results||[]).length;const pass=mm===0&&ok===tot;
        return `<tr><td class="bold">${v.batchNo}</td><td>${v.model}</td><td>${v.kitQty}</td><td>${v.date}</td><td>${v.by||'&mdash;'}</td>
          <td><span style="font-size:12px">${ok}/${tot}${mm>0?` <span class="muted">(${mm} mismatch)</span>`:''}</span></td>
          <td><span class="pill ${pass?'pill-green':mm>0?'pill-red':'pill-amber'}">${pass?'PASS':mm>0?'FAIL':'PARTIAL'}</span></td>
          <td class="text-right"><button class="btn btn-xs" onclick="generatePDFById('${v.id}')">${ico.pdf} PDF</button></td>
        </tr>`;}).join('')}</tbody>
    </table></div>
  </div>`:''}
</div>`;}

function verStep2(){
  const bom=S.boms[S.verDetails.model]||[];
  const q=S.verSearch.toLowerCase();
  const filtered=bom.filter(p=>p.desc.toLowerCase().includes(q)||p.pn.toLowerCase().includes(q));
  const verified=Object.values(S.verResults).filter(r=>r.status==='verified').length;
  const mismatch=Object.values(S.verResults).filter(r=>r.status==='mismatch').length;
  const total=bom.length;
  const done=verified+mismatch;
  const pct=total?Math.round(done/total*100):0;
  return `<div class="page" style="padding-bottom:80px">
  <div class="page-hd">
    <div class="page-hd-left">
      <h1>Part Verification</h1>
      <p>Batch <b>${S.verDetails.batchNo}</b> &middot; ${S.verDetails.model} &middot; ${S.verDetails.kitQty} kits</p>
      <div class="gap mt" style="gap:6px">
        <span class="pill pill-green">${verified} verified</span>
        ${mismatch>0?`<span class="pill pill-red">${mismatch} mismatch</span>`:''}
        <span class="pill pill-gray">${total-done} pending</span>
        <span class="muted small">${pct}% complete</span>
      </div>
      <div class="progress" style="width:320px"><div class="progress-fill" style="width:${pct}%;background:${mismatch>0?'var(--amber)':'var(--blue)'}"></div></div>
    </div>
    <div class="gap"><button class="btn" onclick="verifyAll()">${ico.checks} Mark All Verified</button></div>
  </div>
  ${stepsHtml(2)}
  <div class="card">
    <div class="card-hd">
      <span class="card-hd-title">BOM Checklist &mdash; ${S.verDetails.model}</span>
      <div class="search-wrap" style="width:280px">${ico.search}<input type="text" id="verSearch" placeholder="Search part&hellip;" value="${S.verSearch}" oninput="S.verSearch=this.value;render()" style="height:34px"></div>
    </div>
    <div class="checklist-hdr checklist-row"><span>Description</span><span>Master PN</span><span>Found PN</span><span>Qty</span><span>Status</span><span>Actions</span></div>
    ${filtered.map(p=>{const r=S.verResults[p.id]||{};const cls=r.status==='verified'?'verified':r.status==='mismatch'?'mismatch':'';
      return `<div class="checklist-row ${cls}">
        <div><div style="font-weight:500;font-size:13px">${p.desc}</div>${p.critical?`<div class="critical-badge">&#9888; Critical</div>`:''}${r.status==='mismatch'?`<div class="ecn-req mt">${ico.alert} ECN required</div>`:''}</div>
        <div><span class="tag-blue">${p.pn}</span>${p.alt?`<div class="muted small mt">Alt: ${p.alt}</div>`:''}</div>
        <div>${r.newPN?`<span class="tag-red">${r.newPN}</span>`:`<span class="muted">&mdash;</span>`}</div>
        <div class="muted">${p.qty} ${p.unit}</div>
        <div>${r.status==='verified'?`<span class="pill pill-green">${ico.check} Match</span>`:r.status==='mismatch'?`<span class="pill pill-red">${ico.x} Mismatch</span>`:`<span class="pill pill-gray">Pending</span>`}</div>
        <div class="gap" style="gap:5px;flex-wrap:wrap">
          ${r.status!=='verified'?`<button class="btn btn-xs btn-success" onclick="markVerified('${p.id}')">${ico.check} Match</button>`:''}
          ${r.status!=='mismatch'?`<button class="btn btn-xs btn-danger" onclick="promptMismatch('${p.id}','${p.pn}')">${ico.x} Mismatch</button>`:''}
          ${r.status==='mismatch'&&!r.ecnRaised?`<button class="btn btn-xs btn-amber" onclick="ecnFromVerify('${p.id}','${p.pn}','${p.desc.replace(/'/g,"\\'")}','${(r.newPN||'').replace(/'/g,"\\'")}')"> ${ico.ecn} ECN</button>`:''}
          ${r.ecnRaised?`<span class="ecn-req">ECN raised</span>`:''}
        </div>
      </div>`;}).join('')}
    <div class="action-bar">
      <button class="btn" onclick="S.verStep=1;render()">&larr; Back</button>
      <button class="btn btn-primary" onclick="finishVerification()">Complete &amp; Generate Report &rarr;</button>
    </div>
  </div>
</div>`;}

function verStep3(){
  const bom=S.boms[S.verDetails.model]||[];
  const ok=Object.values(S.verResults).filter(r=>r.status==='verified').length;
  const mm=Object.values(S.verResults).filter(r=>r.status==='mismatch').length;
  const pending=bom.length-ok-mm;
  const pass=mm===0&&pending===0;
  return `<div class="page">
  <div class="page-hd">
    <div class="page-hd-left"><h1>Verification Report</h1><p>${S.verDetails.batchNo} &middot; ${S.verDetails.model}</p></div>
    <div class="gap">
      <button class="btn btn-primary" onclick="generatePDF()">${ico.pdf} Generate PDF</button>
      <button class="btn" onclick="exportCSV()">${ico.download} Download CSV</button>
    </div>
  </div>
  ${stepsHtml(3)}
  <div class="${pass?'alert alert-success':'alert alert-danger'}">${pass?ico.check:ico.alert} <strong>${pass?'Verification Passed &mdash; All parts match master BOM':'Verification Failed &mdash; '+mm+' mismatch'+(mm>1?'es':'')+' found'}</strong></div>
  <div class="stats-row">
    <div class="stat-box"><div class="stat-box-val">${bom.length}</div><div class="stat-box-lbl">Total Parts</div></div>
    <div class="stat-box green"><div class="stat-box-val">${ok}</div><div class="stat-box-lbl">Verified</div></div>
    <div class="stat-box ${mm>0?'red':''}"><div class="stat-box-val">${mm}</div><div class="stat-box-lbl">Mismatches</div></div>
    <div class="stat-box ${pending>0?'amber':''}"><div class="stat-box-val">${pending}</div><div class="stat-box-lbl">Unchecked</div></div>
  </div>
  <div class="grid-2">
    <div class="card">
      <div class="card-hd"><span class="card-hd-title">Batch Summary</span></div>
      <div class="card-body"><table style="width:100%;font-size:13px">
        ${[['Batch / Lot No',S.verDetails.batchNo],['Model',S.verDetails.model],['Kit Quantity',S.verDetails.kitQty],['Date',S.verDetails.date],['Verified By',S.verDetails.by||'&mdash;'],['Factory',S.verDetails.factory||'&mdash;'],['Remarks',S.verDetails.remarks||'&mdash;']].map(([k,v])=>`<tr><td class="muted" style="padding:6px 0;width:130px">${k}</td><td style="font-weight:500;padding:6px 0">${v}</td></tr>`).join('')}
        <tr><td class="muted" style="padding:6px 0">Result</td><td style="padding:6px 0"><span class="pill ${pass?'pill-green':'pill-red'}">${pass?'PASS':'FAIL'}</span></td></tr>
      </table></div>
    </div>
    <div class="card">
      <div class="card-hd"><span class="card-hd-title">Mismatch Summary</span></div>

function startVer(){
  const batch=document.getElementById('vBatch').value.trim();
  const model=document.getElementById('vModel').value;
  const qty=document.getElementById('vQty').value;
  if(!batch||!model||!qty){toast('Fill in batch number, model, and kit quantity','err');return;}
  S.verDetails={batchNo:batch,model,kitQty:qty,date:document.getElementById('vDate').value,by:document.getElementById('vBy').value,factory:document.getElementById('vFactory').value,remarks:document.getElementById('vRemarks').value};
  S.verResults={};S.verSearch='';S.verStep=2;render();
}
function markVerified(id){S.verResults[id]={status:'verified'};render();}
function promptMismatch(id,masterPN){showMismatchModal(id,masterPN);}
function verifyAll(){const bom=S.boms[S.verDetails.model]||[];bom.forEach(p=>{if(!(S.verResults[p.id]||{}).status)S.verResults[p.id]={status:'verified'};});render();}
function finishVerification(){
  const bom=S.boms[S.verDetails.model]||[];
  const results=bom.map(p=>({...p,status:(S.verResults[p.id]||{}).status||'pending',newPN:(S.verResults[p.id]||{}).newPN||''}));
  const mm=results.filter(r=>r.status==='mismatch').length;const ok=results.filter(r=>r.status==='verified').length;
  S.verifications.push({id:'VER_'+Date.now(),...S.verDetails,results,result:mm===0&&ok===results.length?'PASS':'FAIL'});
  saveState();updateBadges();S.verStep=3;render();
}
function ecnFromVerify(partId,oldPN,desc,newPN){showECNModal({partId,oldPN,desc,newPN,model:S.verDetails.model||partId.split('-')[0]});}

function closeModal(){document.getElementById('modal-container').innerHTML='';}

function addPart(){
  const desc=document.getElementById('np_desc').value.trim();
  const pn=document.getElementById('np_pn').value.trim();
  if(!desc||!pn){toast('Description and Part Number required','err');return;}
  const idx=S.boms[S.activeSKU].length+1;
  S.boms[S.activeSKU].push({id:`${S.activeSKU}-${String(idx).padStart(3,'0')}`,desc,pn,cat:document.getElementById('np_cat').value,qty:parseInt(document.getElementById('np_qty').value)||1,unit:document.getElementById('np_unit').value,alt:document.getElementById('np_alt').value.trim(),critical:document.getElementById('np_crit').checked});
  saveState();updateBadges();closeModal();toast('Part added to BOM');render();
}
function deletePart(id){
  const sku=S.skus.find(s=>S.boms[s].some(p=>p.id===id));
  if(!sku)return;
  if(!confirm('Delete part '+id+'?'))return;
  S.boms[sku]=S.boms[sku].filter(p=>p.id!==id);
  saveState();updateBadges();toast('Part deleted');render();
}

  document.getElementById('modal-container').innerHTML=`<div class="modal-bg">

function confirmMismatch(id){

function submitECN(partId){
  const model=document.getElementById('ecn_model').value;
  const oldPN=document.getElementById('ecn_old').value.trim();
  const newPN=document.getElementById('ecn_new').value.trim();
  const desc=document.getElementById('ecn_desc').value.trim();
  const reason=document.getElementById('ecn_reason').value.trim();
  if(!oldPN||!newPN||!desc||!reason){toast('Fill all required fields','err');return;}
  const ecnNo=`ECN-${new Date().getFullYear()}-${String(S.ecns.length+1).padStart(3,'0')}`;
  S.ecns.push({ecnNo,model,date:document.getElementById('ecn_date').value,oldPN,newPN,desc,reason,docName:document.getElementById('ecn_doc').value.trim(),approved:document.getElementById('ecn_approve').checked});
  if(document.getElementById('ecn_bom').checked){const part=S.boms[model]?.find(p=>p.pn===oldPN);if(part){part.pn=newPN;toast(`Master BOM updated: ${oldPN} → ${newPN}`);}else toast('Part not in BOM — add manually','info');}
  if(partId&&S.verResults[partId])S.verResults[partId].ecnRaised=true;
  saveState();updateBadges();closeModal();toast(`${ecnNo} raised`);render();
}

  <div class="st bl"><div class="sv">${total}</div><div class="sl">Total Parts</div></div>
  <div class="st gr"><div class="sv">${ok}</div><div class="sl">Verified</div></div>
  <div class="st ${mm>0?'rd':'gr'}"><div class="sv">${mm}</div><div class="sl">Mismatches</div></div>
  <div class="st ${pending>0?'am':''}"><div class="sv">${pending}</div><div class="sl">Unchecked</div></div>
  <div class="st ${pct===100?'gr':'bl'}"><div class="sv">${pct}%</div><div class="sl">Match Rate</div></div>
</div>
<div class="${pass?'ab ap':'ab af'}">${pass?'All parts verified &mdash; no deviations from master BOM.':`${mm} part mismatch${mm>1?'es':''} detected. ECN required for affected parts.`}</div>
<div class="sec">Part-by-Part Verification</div>
<table><thead><tr><th>#</th><th>Part ID</th><th>Description</th><th>Master PN</th><th>Found PN</th><th>Qty</th><th>Critical</th><th>Status</th></tr></thead>
<tbody>${results.map((p,i)=>`<tr class="${p.status==='verified'?'vv':p.status==='mismatch'?'mm':''}">
  <td style="color:#8A8A94">${i+1}</td><td style="font-size:10px;color:#4A4A50">${p.id}</td>
  <td><b>${p.desc}</b>${p.critical?` <span style="color:#B06A00;font-size:9px">CRITICAL</span>`:''}</td>
  <td><code class="cb">${p.pn}</code></td>
  <td>${p.newPN?`<code class="cr">${p.newPN}</code>`:'<span style="color:#8A8A94">&mdash;</span>'}</td>
  <td>${p.qty} ${p.unit}</td>
  <td>${p.critical?`<span class="pill pa">YES</span>`:'<span style="color:#8A8A94">No</span>'}</td>
  <td><span class="pill ${p.status==='verified'?'pg':p.status==='mismatch'?'pr':'py'}">${p.status==='verified'?'VERIFIED':p.status==='mismatch'?'MISMATCH':'PENDING'}</span></td>
</tr>`).join('')}</tbody></table>
${relECNs.length>0?`<div class="sec" style="margin-top:16px">ECN References</div>
<table><thead><tr><th>ECN No</th><th>Old PN</th><th>New PN</th><th>Description</th><th>Reason</th><th>Document</th><th>Status</th></tr></thead>
<tbody>${relECNs.map(e=>`<tr><td><b>${e.ecnNo}</b></td><td><code style="text-decoration:line-through;color:#B52B2B">${e.oldPN}</code></td><td><code class="cb">${e.newPN}</code></td><td>${e.desc}</td><td style="color:#4A4A50;font-size:10px">${e.reason}</td><td style="font-size:10px">${e.docName||'&mdash;'}</td><td><span class="pill ${e.approved?'pg':'pa'}">${e.approved?'APPROVED':'PENDING'}</span></td></tr>`).join('')}</tbody></table>`:''}
<div class="sign">
  <div><div class="sh">PREPARED BY</div><div class="sc"><b>${ver.by||'___________________'}</b><br><span style="color:#8A8A94;font-size:10px">Name / Signature / Date</span></div></div>
  <div style="border-left:1px solid #DDE2EA"><div class="sh">QC REVIEWED BY</div><div class="sc" style="color:#8A8A94">___________________<br><span style="font-size:10px">Name / Signature / Date</span></div></div>
  <div style="border-left:1px solid #DDE2EA"><div class="sh">APPROVED BY</div><div class="sc" style="color:#8A8A94">___________________<br><span style="font-size:10px">Name / Signature / Date</span></div></div>
</div>
<div class="ft">Circuit House &middot; BOM Verification Report &middot; Generated: ${now} &middot; ${ver.id}</div>
</body></html>`;
  const win=window.open('','_blank');win.document.write(html);win.document.close();
  toast('PDF report opened — use Print to save as PDF');
}

function exportCSV(){const lastVer=S.verifications[S.verifications.length-1];if(lastVer)exportCSVById(lastVer.id);}
function exportCSVSelected(){const sel=document.getElementById('csvSelVer');if(sel&&sel.value)exportCSVById(sel.value);}
function exportCSVById(id){
  const ver=S.verifications.find(v=>v.id===id);if(!ver)return;
  const rows=[['Circuit House BOM Verification Report'],[`Batch:${ver.batchNo}`,`Model:${ver.model}`,`Kit Qty:${ver.kitQty}`,`Date:${ver.date}`,`By:${ver.by||''}`,`Factory:${ver.factory||''}`,`Result:${ver.result||''}`],[],['Part ID','Description','Master PN','Found PN','Qty','Unit','Critical','Status'],...(ver.results||[]).map(p=>[p.id,p.desc,p.pn,p.newPN||p.pn,p.qty,p.unit,p.critical?'YES':'No',p.status])];
  const csv=rows.map(r=>r.map(c=>`"${String(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);a.download=`BOM_VER_${ver.batchNo}_${ver.model}.csv`;a.click();toast('CSV downloaded');
}

let toastTimer;
function toast(msg,type='ok'){
  clearTimeout(toastTimer);
  const t=document.getElementById('toast');const icon=document.getElementById('toast-icon');
  document.getElementById('toast-msg').textContent=msg;
  icon.className='toast-icon '+type;
  icon.innerHTML=type==='err'?'<svg width="10" height="10" fill="none" stroke="#fff" stroke-width="3" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>':type==='info'?'<svg width="10" height="10" fill="none" stroke="#fff" stroke-width="3" viewBox="0 0 24 24"><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>':'<svg width="10" height="10" fill="none" stroke="#fff" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>';
  t.classList.add('show');toastTimer=setTimeout(()=>t.classList.remove('show'),3500);
}

updateBadges();render();
</script>
