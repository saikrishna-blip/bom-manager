<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Circuit House · BOM Manager</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0C3D6B;--blue:#1A6BC4;--blue-lt:#EAF2FB;--blue-md:#C2DCF5;
  --green:#2D7A1F;--green-lt:#E6F4E3;--red:#B52B2B;--red-lt:#FBEAEA;
  --amber:#B06A00;--amber-lt:#FEF3E2;--purple:#5B2D8E;--purple-lt:#F0EAF8;
  --ink:#18181A;--ink-2:#4A4A50;--ink-3:#8A8A94;
  --surface:#FFFFFF;--wash:#F4F6F9;--border:#DDE2EA;--border-2:#C5CDD8;
  --radius:8px;--radius-lg:14px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.05);
  --shadow-md:0 2px 8px rgba(0,0,0,.10),0 8px 24px rgba(0,0,0,.08);
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'SF Mono','Consolas',monospace;
}
html,body{height:100%;font-family:var(--font);font-size:14px;background:var(--wash);color:var(--ink)}
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:232px;flex-shrink:0;background:var(--navy);display:flex;flex-direction:column;overflow-y:auto}
.content{flex:1;overflow-y:auto}
.page{padding:28px 32px;max-width:1300px}
.sb-brand{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo-mark{display:inline-flex;align-items:center;gap:7px}
.sb-logo-icon{width:26px;height:26px;background:var(--blue);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-brand-name{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.3px}
.sb-brand-sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px}
.sb-section{padding:12px 0 4px}
.sb-label{font-size:10px;font-weight:600;color:rgba(255,255,255,.3);letter-spacing:.9px;text-transform:uppercase;padding:0 18px 6px}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 18px;font-size:13px;color:rgba(255,255,255,.65);cursor:pointer;transition:all .15s;border-left:2px solid transparent}
.sb-item:hover{color:#fff;background:rgba(255,255,255,.07)}
.sb-item.active{color:#fff;background:rgba(255,255,255,.12);border-left-color:var(--blue);font-weight:500}
.sb-badge{margin-left:auto;font-size:10px;font-weight:600;background:rgba(255,255,255,.18);color:#fff;border-radius:10px;padding:2px 7px;min-width:20px;text-align:center}
.sb-badge.green{background:var(--green)}.sb-badge.amber{background:var(--amber)}.sb-badge.red{background:var(--red)}.sb-badge.purple{background:var(--purple)}
.sb-bottom{margin-top:auto;padding:14px 18px;border-top:1px solid rgba(255,255,255,.1)}
.sb-status{display:flex;align-items:center;gap:7px;font-size:11px;color:rgba(255,255,255,.4)}
.sb-dot{width:7px;height:7px;border-radius:50%;background:#4ADE80;box-shadow:0 0 6px rgba(74,222,128,.5)}
.page-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:12px}
.page-hd-left h1{font-size:20px;font-weight:700;letter-spacing:-.4px}
.page-hd-left p{font-size:13px;color:var(--ink-3);margin-top:3px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px}
.stat-box-val{font-size:28px;font-weight:700;letter-spacing:-.5px}
.stat-box-lbl{font-size:12px;color:var(--ink-3);margin-top:2px}
.stat-box-sub{font-size:11px;color:var(--ink-3);margin-top:6px}
.stat-box.blue .stat-box-val{color:var(--blue)}.stat-box.green .stat-box-val{color:var(--green)}
.stat-box.red .stat-box-val{color:var(--red)}.stat-box.amber .stat-box-val{color:var(--amber)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg)}
.card-hd{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.card-hd-title{font-size:14px;font-weight:600}
.card-body{padding:20px}.card-body-sm{padding:16px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border-2);background:var(--surface);color:var(--ink);transition:all .12s;white-space:nowrap;font-family:var(--font)}
.btn:hover{background:var(--wash)}.btn:active{transform:scale(.98)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}.btn-primary:hover{background:#1559a8}
.btn-success{background:var(--green);color:#fff;border-color:var(--green)}.btn-success:hover{background:#236016}
.btn-danger{background:var(--red);color:#fff;border-color:var(--red)}.btn-danger:hover{background:#941f1f}
.btn-amber{background:var(--amber);color:#fff;border-color:var(--amber)}.btn-amber:hover{background:#8a5200}
.btn-purple{background:var(--purple);color:#fff;border-color:var(--purple)}.btn-purple:hover{background:#4a2278}
.btn-ghost{border-color:transparent;background:transparent}.btn-ghost:hover{background:var(--wash)}
.btn-sm{padding:5px 10px;font-size:12px}.btn-xs{padding:3px 8px;font-size:11px}
.btn[disabled]{opacity:.4;pointer-events:none}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:12px;font-weight:500;color:var(--ink-2)}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 11px;border:1px solid var(--border-2);border-radius:var(--radius);font-size:13px;color:var(--ink);font-family:var(--font);background:var(--surface);transition:border-color .12s,box-shadow .12s}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,107,196,.12)}
.fg textarea{resize:vertical;min-height:72px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.fg-row{display:flex;align-items:center;gap:8px}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--ink-3)}
.search-wrap input{padding-left:34px}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:10px 12px;font-size:11px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:.5px;text-align:left;border-bottom:1px solid var(--border);background:var(--wash);white-space:nowrap}
tbody td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--blue-lt)}
.tr-verified td{background:rgba(45,122,31,.04)}.tr-mismatch td{background:rgba(181,43,43,.05)}
.tr-verified:hover td{background:rgba(45,122,31,.08)!important}.tr-mismatch:hover td{background:rgba(181,43,43,.1)!important}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.pill-blue{background:var(--blue-lt);color:var(--blue)}.pill-green{background:var(--green-lt);color:var(--green)}
.pill-red{background:var(--red-lt);color:var(--red)}.pill-amber{background:var(--amber-lt);color:var(--amber)}
.pill-gray{background:var(--wash);color:var(--ink-2);border:1px solid var(--border)}
.pill-purple{background:var(--purple-lt);color:var(--purple)}
.tag-mono{font-family:var(--mono);font-size:11px;background:var(--wash);border:1px solid var(--border);padding:2px 7px;border-radius:5px;color:var(--ink-2)}
.tag-blue{font-family:var(--mono);font-size:11px;background:var(--blue-lt);color:var(--blue);padding:2px 7px;border-radius:5px}
.tag-red{font-family:var(--mono);font-size:11px;background:var(--red-lt);color:var(--red);padding:2px 7px;border-radius:5px}
.tabs{display:flex;gap:2px;background:var(--wash);border:1px solid var(--border);border-radius:var(--radius-lg);padding:4px;margin-bottom:20px;width:fit-content}
.tab{padding:7px 18px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;color:var(--ink-3);transition:all .15s}
.tab:hover{color:var(--ink)}.tab.active{background:var(--surface);color:var(--blue);box-shadow:var(--shadow)}
.steps{display:flex;align-items:center;margin-bottom:28px}
.step{display:flex;align-items:center;gap:8px}
.step-num{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.step-num.done{background:var(--green);color:#fff}.step-num.active{background:var(--blue);color:#fff}.step-num.pending{background:var(--border);color:var(--ink-3)}
.step-label{font-size:13px}.step-label.active{font-weight:600;color:var(--blue)}.step-label.done{color:var(--green)}.step-label.pending{color:var(--ink-3)}
.step-line{flex:1;height:2px;background:var(--border);margin:0 10px;border-radius:1px}.step-line.done{background:var(--green)}
.progress{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;border-radius:3px;transition:width .4s}
.alert{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:16px}
.alert-info{background:var(--blue-lt);color:var(--blue);border:1px solid var(--blue-md)}
.alert-success{background:var(--green-lt);color:var(--green);border:1px solid #A8D5A0}
.alert-warning{background:var(--amber-lt);color:var(--amber);border:1px solid #F0C57A}
.alert-danger{background:var(--red-lt);color:var(--red);border:1px solid #F0A5A5}
.alert-purple{background:var(--purple-lt);color:var(--purple);border:1px solid #C9A8E8}
hr{border:none;border-top:1px solid var(--border);margin:16px 0}
.action-bar{position:sticky;bottom:0;background:var(--surface);border-top:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.modal-bg{position:fixed;inset:0;background:rgba(12,20,30,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;backdrop-filter:blur(2px)}
.modal{background:var(--surface);border-radius:var(--radius-lg);width:580px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-md)}
.modal-lg{width:820px}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border)}
.modal-hd h3{font-size:15px;font-weight:700}
.modal-body{padding:20px}.modal-ft{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:#fff;border-radius:var(--radius-lg);padding:12px 18px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:9px;box-shadow:var(--shadow-md);z-index:2000;opacity:0;transform:translateY(10px) scale(.97);transition:all .2s;pointer-events:none;max-width:400px}
.toast.show{opacity:1;transform:translateY(0) scale(1)}
.toast-icon{flex-shrink:0;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.toast-icon.ok{background:#4ADE80}.toast-icon.err{background:#F87171}.toast-icon.info{background:#60A5FA}
.gap{display:flex;gap:8px;align-items:center}
.mt{margin-top:8px}.mt-2{margin-top:16px}.mt-3{margin-top:24px}
.mb{margin-bottom:8px}.mb-2{margin-bottom:16px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.muted{color:var(--ink-3)}.small{font-size:12px}.bold{font-weight:700}
.text-right{text-align:right}.text-center{text-align:center}.flex-1{flex:1}
input[type=checkbox]{width:15px;height:15px;accent-color:var(--blue);cursor:pointer}
.critical-badge{font-size:10px;color:var(--amber);font-weight:600}
.ecn-req{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;background:var(--amber-lt);color:var(--amber);border-radius:4px;padding:2px 6px;border:1px solid #F0C57A}
.qa-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.qa-btn{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--wash);border:1px solid var(--border);border-radius:var(--radius-lg);cursor:pointer;transition:all .15s;text-align:left;width:100%}
.qa-btn:hover{background:var(--blue-lt);border-color:var(--blue-md)}
.qa-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qa-label{font-size:13px;font-weight:600}.qa-sub{font-size:11px;color:var(--ink-3);margin-top:1px}
.checklist-row{display:grid;grid-template-columns:1fr 130px 130px 60px 90px 190px;gap:0;align-items:center;padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px}
.checklist-row:hover{background:var(--blue-lt)}
.checklist-row.verified{background:rgba(45,122,31,.04)}.checklist-row.verified:hover{background:rgba(45,122,31,.08)}
.checklist-row.mismatch{background:rgba(181,43,43,.05)}.checklist-row.mismatch:hover{background:rgba(181,43,43,.1)}
.checklist-hdr{background:var(--wash);font-size:11px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--border);padding:8px 12px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;gap:12px}
.empty-icon{width:56px;height:56px;background:var(--wash);border-radius:16px;display:flex;align-items:center;justify-content:center}
.empty h3{font-size:15px;font-weight:600}.empty p{font-size:13px;color:var(--ink-3);max-width:280px}

/* ── Bulk Upload ── */
.upload-zone{border:2px dashed var(--border-2);border-radius:var(--radius-lg);padding:40px;text-align:center;cursor:pointer;transition:all .2s;background:var(--wash)}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--blue);background:var(--blue-lt)}
.upload-zone-icon{width:48px;height:48px;background:var(--blue-lt);border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.upload-zone h3{font-size:14px;font-weight:600;margin-bottom:6px}
.upload-zone p{font-size:12px;color:var(--ink-3)}
.preview-table{font-size:12px}
.preview-table th{font-size:10px;padding:6px 10px}
.preview-table td{padding:6px 10px}
.row-new td{background:rgba(45,122,31,.06)}
.row-dup td{background:rgba(181,43,43,.05)}
.row-update td{background:rgba(176,106,0,.06)}
.format-card{background:var(--wash);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px}
.format-card code{display:block;font-family:var(--mono);font-size:11px;color:var(--ink-2);margin-top:8px;line-height:1.8;white-space:pre}

/* Drive save indicator */
.drive-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px;background:#E8F5E9;color:#2D7A1F;border:1px solid #A8D5A0}
.drive-pending{background:var(--amber-lt);color:var(--amber);border-color:#F0C57A}

@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .7s linear infinite;display:inline-block}
</style>
</head>
<body>
<div class="shell">
<div class="sidebar">
  <div class="sb-brand">
    <div class="sb-logo-mark">
      <div class="sb-logo-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg></div>
      <div><div class="sb-brand-name">BOM Manager</div><div class="sb-brand-sub">Circuit House · Lumio</div></div>
    </div>
  </div>
  <div class="sb-section">
    <div class="sb-label">Main</div>
    <div class="sb-item active" id="nav-dashboard" onclick="nav('dashboard')">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </div>
    <div class="sb-item" id="nav-bom" onclick="nav('bom')">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
      Master BOM <span class="sb-badge" id="sb-bom-badge">55</span>
    </div>
    <div class="sb-item" id="nav-bulk" onclick="nav('bulk')">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/></svg>
      Bulk Upload <span class="sb-badge purple" id="sb-bulk-badge">NEW</span>
    </div>
    <div class="sb-item" id="nav-verify" onclick="nav('verify')">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      Verification <span class="sb-badge amber" id="sb-ver-badge">0</span>
    </div>
    <div class="sb-item" id="nav-ecn" onclick="nav('ecn')">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/><line x1="12" y1="12" x2="12" y2="18"/></svg>
      ECN Log <span class="sb-badge green" id="sb-ecn-badge">0</span>
    </div>
    <div class="sb-item" id="nav-reports" onclick="nav('reports')">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Reports & Drive
    </div>
  </div>
  <div class="sb-bottom"><div class="sb-status"><span class="sb-dot"></span>Circuit House v3.0</div></div>
</div>
<div class="content" id="content"></div>
</div>
<div class="toast" id="toast"><div class="toast-icon ok" id="toast-icon"><svg width="10" height="10" fill="none" stroke="#fff" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><span id="toast-msg"></span></div>
<div id="modal-container"></div>

<script>
// ── State ──
const S={
  page:'dashboard',skus:['LH1G','LH3G'],activeSKU:'LH1G',
  bomSearch:'',verStep:1,verDetails:{},verResults:{},verSearch:'',
  driveLog:[],
  boms:{
    LH1G:[
      {id:'LH1G-001',desc:'Main PCBA Board',pn:'PCB-LH1G-V2',cat:'Electronics',qty:1,unit:'PCS',alt:'PCB-LH1G-V1',critical:true,supplier:'SDMC'},
      {id:'LH1G-002',desc:'Power Supply Unit 65W',pn:'PSU-65W-IEC',cat:'Power',qty:1,unit:'PCS',alt:'PSU-65W-C13',critical:true,supplier:''},
      {id:'LH1G-003',desc:'LCD Panel 1080p',pn:'LCD-1080-LH1G',cat:'Display',qty:1,unit:'PCS',alt:'',critical:true,supplier:''},
      {id:'LH1G-004',desc:'Cooling Fan 40mm',pn:'FAN-40-5V',cat:'Thermal',qty:2,unit:'PCS',alt:'FAN-40-12V',critical:false,supplier:''},
      {id:'LH1G-005',desc:'Speaker 8ohm 3W',pn:'SPK-8R3W',cat:'Audio',qty:2,unit:'PCS',alt:'',critical:false,supplier:''},
      {id:'LH1G-006',desc:'Power Cord IEC C13 1.5m',pn:'CORD-IEC-C13-1.5M',cat:'Cable',qty:1,unit:'PCS',alt:'CORD-IEC-C13-1.8M',critical:true,supplier:''},
      {id:'LH1G-007',desc:'Remote Control',pn:'RC-LH1G-STD',cat:'Accessory',qty:1,unit:'PCS',alt:'',critical:false,supplier:''},
      {id:'LH1G-008',desc:'Lens Assembly 1.2x',pn:'LENS-1.2X-LH1G',cat:'Optics',qty:1,unit:'PCS',alt:'',critical:true,supplier:''},
    ],

  const rv=[...S.verifications].reverse().slice(0,4);
  return `<div class="page">
  <div class="page-hd">
    <div class="page-hd-left"><h1>Dashboard</h1><p>Circuit House · Lumio Projector BOM &amp; Quality Management</p></div>
    <div class="gap"><button class="btn btn-purple" onclick="nav('bulk')">${ico.bulk} Bulk Upload</button><button class="btn btn-primary" onclick="nav('verify')">${ico.check} Start Verification</button></div>
  </div>
  <div class="stats-row">
    <div class="stat-box blue"><div class="stat-box-val">${tp}</div><div class="stat-box-lbl">Total BOM Parts</div><div class="stat-box-sub">LH1G (${S.boms.LH1G.length}) · LH3G (${S.boms.LH3G.length})</div></div>
    <div class="stat-box"><div class="stat-box-val">${vc}</div><div class="stat-box-lbl">Verifications</div><div class="stat-box-sub">Across all batches</div></div>
    <div class="stat-box ${ec>0?'amber':''}"><div class="stat-box-val">${ec}</div><div class="stat-box-lbl">ECNs Raised</div><div class="stat-box-sub">${mm} part mismatches</div></div>
    <div class="stat-box ${S.driveLog.length>0?'green':''}"><div class="stat-box-val">${S.driveLog.length}</div><div class="stat-box-lbl">Drive Saves</div><div class="stat-box-sub">Google Drive uploads</div></div>
  </div>
  <div class="grid-2">
    <div class="card">
      <div class="card-hd"><span class="card-hd-title">Quick Actions</span></div>
      <div class="card-body"><div class="qa-grid">
        <button class="qa-btn" onclick="nav('bulk')"><div class="qa-icon" style="background:var(--purple-lt)">${ico.bulk.replace('14','18')}</div><div><div class="qa-label">Bulk Upload BOM</div><div class="qa-sub">Upload CSV / paste data</div></div></button>
        <button class="qa-btn" onclick="nav('verify')"><div class="qa-icon" style="background:var(--blue-lt)">${ico.check.replace('13','18')}</div><div><div class="qa-label">Batch Verification</div><div class="qa-sub">Check incoming lot</div></div></button>
        <button class="qa-btn" onclick="nav('ecn');setTimeout(()=>showECNModal(),50)"><div class="qa-icon" style="background:var(--amber-lt)">${ico.ecn.replace('14','18')}</div><div><div class="qa-label">Raise ECN</div><div class="qa-sub">Engineering change notice</div></div></button>
        <button class="qa-btn" onclick="nav('reports')"><div class="qa-icon" style="background:var(--green-lt)">${ico.drive.replace('14','18')}</div><div><div class="qa-label">Reports &amp; Drive</div><div class="qa-sub">Export PDF / upload</div></div></button>
      </div></div>
    </div>
    <div class="card">
      <div class="card-hd"><span class="card-hd-title">Recent Verifications</span></div>
      <div class="card-body-sm">
        ${rv.length===0?`<div class="empty" style="padding:32px 0"><p>No verifications yet.</p></div>`:
          rv.map(v=>{const ok=(v.results||[]).filter(r=>r.status==='verified').length;const mm=(v.results||[]).filter(r=>r.status==='mismatch').length;const tot=(v.results||[]).length;const pass=mm===0&&ok===tot;
          return `<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
            <div style="flex:1"><div class="bold" style="font-size:13px">${v.batchNo}</div><div class="muted small">${v.model} · ${v.kitQty} kits · ${v.date}</div></div>
            <span class="pill ${pass?'pill-green':mm>0?'pill-red':'pill-amber'}">${ok}/${tot} ${pass?'Pass':mm>0?'Fail':'Partial'}</span>
            <button class="btn btn-xs btn-ghost" onclick="nav('reports')">${ico.pdf}</button>
          </div>`;}).join('')}
      </div>
    </div>
  </div>
  <div class="grid-2 mt-3">
    ${S.skus.map(sku=>`<div class="card"><div class="card-hd"><span class="card-hd-title">${sku} BOM Overview</span><span class="pill pill-blue">${S.boms[sku].length} parts</span></div>

// ── Master BOM ──
function pageBOM(){
  const q=S.bomSearch.toLowerCase();
  const parts=S.boms[S.activeSKU].filter(p=>p.desc.toLowerCase().includes(q)||p.pn.toLowerCase().includes(q)||p.cat.toLowerCase().includes(q)||((p.supplier||'').toLowerCase().includes(q)));
  return `<div class="page">
  <div class="page-hd">
    <div class="page-hd-left"><h1>Master BOM</h1><p>Single source of truth — ${S.activeSKU} has ${S.boms[S.activeSKU].length} parts</p></div>
    <div class="gap">
      <button class="btn btn-purple" onclick="nav('bulk')">${ico.bulk} Bulk Upload</button>
      <button class="btn btn-primary" onclick="showAddPartModal()">${ico.plus} Add Part</button>
      <button class="btn" onclick="downloadBOMTemplate()">${ico.download} CSV Template</button>
    </div>
  </div>
  <div class="tabs">${S.skus.map(s=>`<div class="tab ${s===S.activeSKU?'active':''}" onclick="S.activeSKU='${s}';S.bomSearch='';render()">${s} <span class="muted small">(${S.boms[s].length})</span></div>`).join('')}</div>
  <div class="card">
    <div class="card-hd">
      <span class="card-hd-title">${S.activeSKU} — ${parts.length} parts shown</span>
      <div class="search-wrap" style="width:300px">${ico.search}<input type="text" placeholder="Search desc, PN, category, supplier…" value="${S.bomSearch}" oninput="S.bomSearch=this.value;render()" style="height:34px"></div>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Part ID</th><th>Description</th><th>Part Number</th><th>Category</th><th>Supplier</th><th>Qty</th><th>Alt PN</th><th>Critical</th><th></th></tr></thead>
      <tbody>${parts.length===0?`<tr><td colspan="9"><div class="empty"><h3>No parts found</h3></div></td></tr>`:
        parts.map(p=>`<tr>
          <td><span class="tag-mono">${p.id}</span></td>
          <td><div style="font-weight:500;max-width:220px">${p.desc}</div>${p.critical?`<div class="critical-badge">⚠ Critical</div>`:''}</td>
          <td><span class="tag-blue">${p.pn}</span></td>
          <td><span class="pill pill-gray">${p.cat}</span></td>
          <td><span class="muted small">${p.supplier||'—'}</span></td>
          <td>${p.qty} ${p.unit}</td>
          <td>${p.alt?`<span class="tag-mono">${p.alt}</span>`:`<span class="muted small">—</span>`}</td>
          <td>${p.critical?`<span class="pill pill-amber">YES</span>`:`<span class="muted small">No</span>`}</td>
          <td><button class="btn btn-xs btn-ghost" onclick="deletePart('${p.id}')">${ico.trash}</button></td>
        </tr>`).join('')}
      </tbody>
    </table></div>
  </div>
</div>`;}

// ── Bulk upload logic ──
function handleDragOver(e){e.preventDefault();document.getElementById('dropZone').classList.add('dragover');}
function handleDragLeave(e){document.getElementById('dropZone').classList.remove('dragover');}
function handleDrop(e){e.preventDefault();document.getElementById('dropZone').classList.remove('dragover');const f=e.dataTransfer.files[0];if(f)readCSVFile(f);}
function handleFileSelect(input){if(input.files[0])readCSVFile(input.files[0]);}
function readCSVFile(f){const r=new FileReader();r.onload=e=>previewBulkCSV(e.target.result);r.readAsText(f);}
function parsePastedCSV(){const t=document.getElementById('pasteArea').value.trim();if(t)previewBulkCSV(t);else toast('Paste some CSV data first','err');}

function parseCSV(text){
  const lines=text.trim().split('\n').map(l=>l.trim()).filter(l=>l);
  if(!lines.length)return[];
  // Detect header
  const first=lines[0].toLowerCase();
  const hasHeader=first.includes('desc')||first.includes('pn')||first.includes('part');
  const dataLines=hasHeader?lines.slice(1):lines;
  const COLS=['id','desc','pn','cat','qty','unit','alt','critical','supplier'];
  let headerMap=null;
  if(hasHeader){
    const hdr=lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/[^a-z]/g,''));
    headerMap={};
    COLS.forEach(c=>{const i=hdr.indexOf(c);if(i>=0)headerMap[c]=i;});
  }
  return dataLines.map((line,idx)=>{
    const cells=line.split(',').map(c=>c.trim().replace(/^"|"$/g,''));
    const get=col=>{
      if(headerMap&&headerMap[col]!==undefined)return cells[headerMap[col]]||'';
      const def={id:0,desc:1,pn:2,cat:3,qty:4,unit:5,alt:6,critical:7,supplier:8};
      return cells[def[col]]||'';
    };
    return{id:get('id')||`BULK-${Date.now()}-${idx}`,desc:get('desc'),pn:get('pn'),cat:get('cat')||'General',qty:parseFloat(get('qty'))||1,unit:get('unit')||'PCS',alt:get('alt'),critical:get('critical').toLowerCase()==='true',supplier:get('supplier')};
  }).filter(p=>p.desc&&p.pn);
}

function previewBulkCSV(text){
  const parsed=parseCSV(text);
  if(!parsed.length){toast('No valid rows found — check format','err');return;}
  const sku=document.getElementById('bulkSKU')?.value||S.activeSKU;
  const dupMode=document.getElementById('bulkDup')?.value||'skip';
  const existing=S.boms[sku]||[];
  const existingPNs=new Set(existing.map(p=>p.pn));

  const rows=parsed.map(p=>{
    const isDup=existingPNs.has(p.pn);
    const rowType=isDup?(dupMode==='skip'?'dup':'update'):'new';
    return{...p,_type:rowType};
  });

  const newCount=rows.filter(r=>r._type==='new').length;
  const dupCount=rows.filter(r=>r._type==='dup').length;
  const updateCount=rows.filter(r=>r._type==='update').length;

  const preview=document.getElementById('bulkPreview');
  preview.innerHTML=`<div class="card mt-3">
    <div class="card-hd">
      <span class="card-hd-title">Preview — ${parsed.length} rows parsed</span>
      <div class="gap">
        <span class="pill pill-green">${newCount} new</span>
        ${dupCount>0?`<span class="pill pill-red">${dupCount} skip (dup)</span>`:''}
        ${updateCount>0?`<span class="pill pill-amber">${updateCount} update</span>`:''}
      </div>
    </div>
    <div class="alert alert-info" style="margin:16px 16px 0">${ico.check} Review below. Green = new part · Red = duplicate (will be ${dupMode==='skip'?'skipped':'updated'})</div>
    <div class="tbl-wrap" style="max-height:400px;overflow-y:auto">
      <table class="preview-table">
        <thead><tr><th>Status</th><th>ID</th><th>Description</th><th>Part Number</th><th>Cat</th><th>Qty</th><th>Unit</th><th>Alt PN</th><th>Critical</th><th>Supplier</th></tr></thead>
        <tbody>${rows.map(r=>`<tr class="${r._type==='new'?'row-new':r._type==='dup'?'row-dup':'row-update'}">
          <td><span class="pill ${r._type==='new'?'pill-green':r._type==='dup'?'pill-red':'pill-amber'}">${r._type==='new'?'NEW':r._type==='dup'?'SKIP':'UPDATE'}</span></td>
          <td><span class="tag-mono" style="font-size:10px">${r.id}</span></td>
          <td style="max-width:200px;font-size:12px">${r.desc}</td>
          <td><span class="tag-blue" style="font-size:10px">${r.pn}</span></td>
          <td><span class="pill pill-gray" style="font-size:10px">${r.cat}</span></td>
          <td>${r.qty}</td><td>${r.unit}</td>
          <td>${r.alt||'—'}</td>
          <td>${r.critical?'<span class="pill pill-amber" style="font-size:10px">YES</span>':'No'}</td>
          <td style="font-size:11px;color:var(--ink-3)">${r.supplier||'—'}</td>
        </tr>`).join('')}</tbody>
      </table>
    </div>
    <div class="action-bar">
      <div class="small muted">Target: <b>${sku}</b> · Duplicate mode: <b>${dupMode}</b></div>
      <div class="gap">
        <button class="btn" onclick="document.getElementById('bulkPreview').innerHTML=''">Cancel</button>
        <button class="btn btn-purple" onclick="commitBulkUpload(${JSON.stringify(rows).replace(/"/g,'&quot;')},'${sku}','${dupMode}')">${ico.bulk} Import ${newCount+(updateCount)} Parts</button>
      </div>
    </div>
  </div>`;
}

function commitBulkUpload(rows,sku,dupMode){
  rows=typeof rows==='string'?JSON.parse(rows):rows;
  const existing=S.boms[sku]||[];
  let added=0,updated=0,skipped=0;
  rows.forEach(r=>{
    const{_type,...part}=r;
    if(_type==='new'){existing.push(part);added++;}
    else if(_type==='update'){const i=existing.findIndex(p=>p.pn===part.pn);if(i>=0){existing[i]={...existing[i],...part};updated++;}else{existing.push(part);added++;}}
    else{skipped++;}
  });
  S.boms[sku]=existing;
  saveState();updateBadges();
  const driveSave=document.getElementById('bulkDrive')?.checked;
  if(driveSave)logDriveSave(`BOM_Bulk_${sku}_${new Date().toISOString().split('T')[0]}.csv`,`Bulk upload: ${added} added, ${updated} updated to ${sku} BOM`);
  document.getElementById('bulkPreview').innerHTML=`<div class="alert alert-success mt-2">${ico.check} <strong>Import complete!</strong> ${added} parts added, ${updated} updated, ${skipped} skipped. ${driveSave?'Saved to Google Drive.':''}</div>`;
  toast(`Imported ${added+updated} parts into ${sku} BOM`);
  setTimeout(()=>{nav('bom');S.activeSKU=sku;},1800);
}

function startVer(){
  const batch=document.getElementById('vBatch').value.trim();const model=document.getElementById('vModel').value;const qty=document.getElementById('vQty').value;
  if(!batch||!model||!qty){toast('Fill batch number, model, and kit quantity','err');return;}
  S.verDetails={batchNo:batch,model,kitQty:qty,date:document.getElementById('vDate').value,by:document.getElementById('vBy').value,factory:document.getElementById('vFactory').value,remarks:document.getElementById('vRemarks').value,driveEnabled:document.getElementById('vDrive')?.checked};
  S.verResults={};S.verSearch='';S.verStep=2;render();
}
function markVerified(id){S.verResults[id]={status:'verified'};render();}
function promptMismatch(id,masterPN){showMismatchModal(id,masterPN);}
function verifyAll(){const bom=S.boms[S.verDetails.model]||[];bom.forEach(p=>{if(!(S.verResults[p.id]||{}).status)S.verResults[p.id]={status:'verified'};});render();}
function finishVerification(){
  const bom=S.boms[S.verDetails.model]||[];
  const results=bom.map(p=>({...p,status:(S.verResults[p.id]||{}).status||'pending',newPN:(S.verResults[p.id]||{}).newPN||''}));
  const mm=results.filter(r=>r.status==='mismatch').length;const ok=results.filter(r=>r.status==='verified').length;
  const vid='VER_'+Date.now();
  const ver={id:vid,...S.verDetails,results,result:mm===0&&ok===results.length?'PASS':'FAIL',savedToDrive:false};
  S.verifications.push(ver);
  if(S.verDetails.driveEnabled){logDriveSave(`VER_${S.verDetails.batchNo}_${S.verDetails.model}.csv`,`Batch verification: ${S.verDetails.model} ${S.verDetails.batchNo}`,'verification');ver.savedToDrive=true;}
  saveState();updateBadges();S.verStep=3;render();
}
function ecnFromVerify(pid,oldPN,desc,newPN){showECNModal({partId:pid,oldPN,desc,newPN,model:S.verDetails.model||pid.split('-')[0]});}

function logDriveSave(name,desc,type='bom'){
  S.driveLog.push({name,desc,type,ts:new Date().toLocaleString('en-IN')});

}
function saveToDrive(){
  const v=S.verifications[S.verifications.length-1];if(!v)return;saveToDriveById(v.id);
}
function saveToDriveById(id){
  const v=S.verifications.find(x=>x.id===id);if(!v)return;
  toast(`Saving to Drive…`,'info');
  setTimeout(()=>{v.savedToDrive=true;logDriveSave(`VER_${v.batchNo}_${v.model}_${v.date}.csv`,`Verification report: ${v.batchNo} ${v.model}`,'verification');saveState();render();toast(`Saved to Drive: VER_${v.batchNo}_${v.model}.csv`);},1500);
}
function saveAllToDrive(){
  S.verifications.filter(v=>!v.savedToDrive).forEach(v=>{v.savedToDrive=true;logDriveSave(`VER_${v.batchNo}_${v.model}.csv`,`Verification: ${v.batchNo} ${v.model}`,'verification');});

  logDriveSave(`LH1G_Master_BOM_${new Date().toISOString().split('T')[0]}.csv`,'LH1G Master BOM export','bom');

function submitECN(pid){
  const model=document.getElementById('ecn_model').value;const oldPN=document.getElementById('ecn_old').value.trim();const newPN=document.getElementById('ecn_new').value.trim();const desc=document.getElementById('ecn_desc').value.trim();const reason=document.getElementById('ecn_reason').value.trim();

  const ecnNo=`ECN-${new Date().getFullYear()}-${String(S.ecns.length+1).padStart(3,'0')}`;
  const docName=document.getElementById('ecn_doc').value.trim();
  S.ecns.push({ecnNo,model,date:document.getElementById('ecn_date').value,oldPN,newPN,desc,reason,docName,approved:document.getElementById('ecn_app').checked});

  <td><code class="cb">${p.pn}</code></td>
  <td>${p.newPN?`<code class="cr">${p.newPN}</code>`:'<span style="color:#8A8A94">—</span>'}</td>
  <td>${p.qty} ${p.unit}</td>
  <td>${p.critical?`<span class="pill pa">YES</span>`:'No'}</td>
  <td><span class="pill ${p.status==='verified'?'pg':p.status==='mismatch'?'pr':'py'}">${p.status.toUpperCase()}</span></td>
</tr>`).join('')}</tbody></table>
${relECNs.length>0?`<div class="sec" style="margin-top:16px">ECN References</div><table><thead><tr><th>ECN No</th><th>Old PN</th><th>New PN</th><th>Description</th><th>Reason</th><th>Status</th></tr></thead>
<tbody>${relECNs.map(e=>`<tr><td><b>${e.ecnNo}</b></td><td><code style="text-decoration:line-through;color:#B52B2B">${e.oldPN}</code></td><td><code class="cb">${e.newPN}</code></td><td>${e.desc}</td><td style="font-size:10px">${e.reason}</td><td><span class="pill ${e.approved?'pg':'pa'}">${e.approved?'APPROVED':'PENDING'}</span></td></tr>`).join('')}</tbody></table>`:''}
<div class="sign">
  <div><div class="sh">PREPARED BY</div><div class="sc"><b>${ver.by||'___________________'}</b><br><span style="color:#8A8A94;font-size:10px">Name / Signature / Date</span></div></div>
  <div style="border-left:1px solid #DDE2EA"><div class="sh">QC REVIEWED BY</div><div class="sc" style="color:#8A8A94">___________________<br><span style="font-size:10px">Name / Signature / Date</span></div></div>
  <div style="border-left:1px solid #DDE2EA"><div class="sh">APPROVED BY</div><div class="sc" style="color:#8A8A94">___________________<br><span style="font-size:10px">Name / Signature / Date</span></div></div>
</div>
<div class="ft">Circuit House · Lumio · BOM Verification Report · ${now} · ${ver.id}</div>
</body></html>`;
  const win=window.open('','_blank');win.document.write(html);win.document.close();
  toast('PDF opened — use Print to save');
}
function exportCSV(){const v=S.verifications[S.verifications.length-1];if(v)exportCSVById(v.id);}
function exportCSVById(id){
  const ver=S.verifications.find(v=>v.id===id);if(!ver)return;
  const rows=[['Circuit House BOM Verification'],[`Batch:${ver.batchNo}`,`Model:${ver.model}`,`Kits:${ver.kitQty}`,`Date:${ver.date}`,`By:${ver.by}`,`Factory:${ver.factory}`,`Result:${ver.result}`],[],['Part ID','Description','Master PN','Found PN','Qty','Unit','Critical','Status'],...(ver.results||[]).map(p=>[p.id,p.desc,p.pn,p.newPN||p.pn,p.qty,p.unit,p.critical?'YES':'No',p.status])];
  const csv=rows.map(r=>r.map(c=>`"${String(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);a.download=`VER_${ver.batchNo}_${ver.model}.csv`;a.click();toast('CSV downloaded');
}

let tt;
function toast(msg,type='ok'){clearTimeout(tt);const t=document.getElementById('toast');const i=document.getElementById('toast-icon');document.getElementById('toast-msg').textContent=msg;i.className='toast-icon '+type;i.innerHTML=type==='err'?'<svg width="10" height="10" fill="none" stroke="#fff" stroke-width="3" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>':type==='info'?'<svg width="10" height="10" fill="none" stroke="#fff" stroke-width="3" viewBox="0 0 24 24"><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>':'<svg width="10" height="10" fill="none" stroke="#fff" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>';t.classList.add('show');tt=setTimeout(()=>t.classList.remove('show'),3500);}

updateBadges();render();
</script>
